repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.12.9
    hooks:
      - id: ruff-check
        args: [ --fix ]
      - id: ruff-format

  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.6.2
    hooks:
      - id: uv-lock

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=1024]
      - id: check-yaml
        exclude: ^deploy/helm/helm-charts-k8s/.*/templates/.*\.ya?ml$
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: [--baseline, .secrets.baseline]

  - repo: local
    hooks:
      - id: clear-notebook-output-cells
        name: Clear Jupyter Notebook Output Cells
        entry: ci/scripts/clear_notebook_output_cells.sh
        files: "\\.ipynb$"
        language: script
      - id: helm-lint
        name: helm lint (deploy charts)
        entry: bash -c 'for chart in deploy/helm/helm-charts-k8s/*; do if [ -d "$chart" ]; then helm lint "$chart"; fi; done'
        language: system
        pass_filenames: false
        stages: [push]
      - id: pytest
        name: pytest
        entry: pytest tests sources --cov=aiq_agent --cov-report=term --cov-fail-under=65
        language: system
        pass_filenames: false
        stages: [push]

  - repo: https://github.com/tcort/markdown-link-check
    rev: v3.11.2
    hooks:
      - id: markdown-link-check
        args: ["-q", "--config", "ci/markdown-link-check-config.json"]

default_language_version:
  python: python3
