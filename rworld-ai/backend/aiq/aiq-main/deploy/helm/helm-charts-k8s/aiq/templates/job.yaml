{{- range $appName, $appConfig := .Values.apps }}
{{- if and $appConfig.enabled (hasKey $appConfig "jobs") }}
{{- range $appConfig.jobs }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .name }}
  namespace: {{ include "aiq.namespace" $ }}
  labels:
    {{- include "aiq.appLabels" (list $ $appName $appConfig) | nindent 4 }}
spec:
  {{- with .backoffLimit }}
  backoffLimit: {{ . }}
  {{- end }}
  {{- with .completions }}
  completions: {{ . }}
  {{- end }}
  {{- with .parallelism }}
  parallelism: {{ . }}
  {{- end }}
  {{- with .ttlSecondsAfterFinished }}
  ttlSecondsAfterFinished: {{ . }}
  {{- end }}
  template:
    metadata:
      labels:
        {{- include "aiq.appSelectorLabels" (list $ $appName) | nindent 8 }}
    spec:
      serviceAccountName: {{ include "aiq.appFullname" (list $ $appName) }}
      restartPolicy: {{ .restartPolicy | default "OnFailure" }}
      {{- with .initContainers }}
      initContainers:
        {{- toYaml . | nindent 6 }}
      {{- end }}
      containers:
      - name: {{ .name }}
        {{- $jobImage := $appConfig.image | default dict }}
        {{- if $jobImage.repository }}
        image: "{{ $jobImage.repository }}:{{ $jobImage.tag | default "latest" }}"
        {{- else }}
        {{- $imageRepo := include "aiq.imageRepository" (list $ $appConfig) }}
        {{- $imageName := include "aiq.imageName" (list $ $appName $appConfig) }}
        image: "{{ $imageRepo }}/{{ $imageName }}:{{ $jobImage.tag | default "latest" }}"
        {{- end }}
        {{- with .command }}
        command:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- with .args }}
        args:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- with .env }}
        env:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- with .resources }}
        resources:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- with .volumeMounts }}
        volumeMounts:
          {{- toYaml . | nindent 10 }}
        {{- end }}
      {{- with .volumes }}
      volumes:
        {{- toYaml . | nindent 6 }}
      {{- end }}
{{- end }}
{{- end }}
{{- end }}
