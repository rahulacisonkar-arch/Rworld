{{- range $appName, $appConfig := .Values.apps }}
{{- if and $appConfig.enabled (hasKey $appConfig "secrets") }}
{{- range $appConfig.secrets }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .name }}
  namespace: {{ include "aiq.namespace" $ }}
  labels:
    {{- include "aiq.appLabels" (list $ $appName $appConfig) | nindent 4 }}
type: {{ .type | default "Opaque" }}
{{- if .data }}
data:
  {{- toYaml .data | nindent 2 }}
{{- end }}
{{- if .stringData }}
stringData:
  {{- toYaml .stringData | nindent 2 }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
