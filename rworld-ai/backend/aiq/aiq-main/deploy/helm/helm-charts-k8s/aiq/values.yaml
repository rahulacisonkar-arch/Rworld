# AI-Q - Minimal Values Configuration
# This file contains only the essential required fields
#
# Quick Start:
#   1. Update required fields below
#   2. Deploy: helm install aiq deployment-k8s/stg/ -f my-values.yaml

# ==========================================
# OPTIONAL: OpenShift Configuration
# ==========================================
# Enable to deploy on OpenShift / OKD clusters.
# When enabled the chart will create Routes instead of Ingresses,
# a RoleBinding for the anyuid SCC, and (optionally) NGC + API key secrets.
# Use with the values-openshift.yaml overlay for the full set of overrides.
openshift:
  enabled: false
  # NGC image pull secret — set password to have the chart create ngc-secret automatically.
  # If left empty, you must create the secret manually before install.
  ngcSecret:
    password: ""
  # Credentials injected into the {project.name}-credentials Secret.
  # This secret is auto-mounted on all pods via envFrom.
  apiKeys:
    nvidiaApiKey: ""
    tavilyApiKey: ""
    dbUserName: "aiq"
    dbUserPassword: "aiq_dev"

# ==========================================
# REQUIRED: Project Configuration
# ==========================================
project:
  name: ""  # REQUIRED: Project name (lowercase, alphanumeric, hyphens)
  deploymentEnv: ""  # REQUIRED: Environment (dev, stg, prd)

  # Optional
  cluster_name: in-cluster
  cloud_provider: onprem

# ==========================================
# OPTIONAL: Namespace Configuration
# ==========================================
namespace:
  create: false  # Set to true to create namespace (useful for ArgoCD)
  labels: {}  # Additional custom labels
  annotations:
    argocd.argoproj.io/sync-wave: "-1"  # Ensures namespace is created first

# ==========================================
# OPTIONAL: Image Pull Secrets
# ==========================================
imagePullSecrets:
  dockerRegistry: null
  artifactRegistry: null

# ==========================================
# OPTIONAL: Global Image Repository
# ==========================================
# Set once for all apps, or override per app
imageRepository: null  # e.g., "my-registry.example.com/my-project"

# ==========================================
# OPTIONAL: External Secrets (Vault)
# ==========================================
externalSecrets:
  enabled: false
  createSecretStore: true
  secretStoreRef:
    name: ""  # Auto-generated if empty: {project.name}-secret-store
    kind: SecretStore
  refreshInterval: "60m"
  vault:
    server: ""
    namespace: ""
    path: ""
    version: "v2"
    auth:
      jwt:
        path: ""
        role: ""  # Format: {project.name}-{deploymentEnv}
        serviceAccountName: "vault-service-account"
        audiences:
          - "https://kubernetes.default.svc"
        expirationSeconds: 600

# ==========================================
# OPTIONAL: Shared Secrets (Simplified)
# ==========================================
# One secret mounted on ALL pods - simplifies secret management
# All apps automatically get access to these secrets as environment variables
sharedSecrets:
  enabled: false  # Enable to use shared secrets across all apps
  name: ""  # Auto-generated: {project.name}-shared-secrets
  targetSecretName: ""  # Auto-generated: {project.name}-credentials
  refreshInterval: "60m"

  # Vault path for shared secrets
  # Default convention: {project.name}/{deploymentEnv}
  # Example: my-project/dev, my-project/prd
  vaultPath: ""  # Leave empty to auto-generate

  # Fetch entire secret from Vault (recommended for simplicity)
  # This will import all key-value pairs from the vault path
  dataFrom: []
    # - extract:
    #     key: my-project/dev  # Fetches all secrets from this path

  # OR specify individual keys (more control)
  data: []
    # - secretKey: DATABASE_URL
    #   remoteRef:
    #     key: my-project/dev
    #     property: database_url
    # - secretKey: API_KEY
    #   remoteRef:
    #     key: my-project/dev
    #     property: api_key

  # Optional: Transform secrets using templates
  templateData: {}
    # Example: Combine multiple secrets into one env var
    # DATABASE_URL: "postgresql://{{ .db_user }}:{{ .db_password }}@{{ .db_host }}:5432/{{ .db_name }}"

  # Automatically mount on all apps (recommended)
  autoMount: true  # If true, all apps get these secrets via envFrom

# ==========================================
# OPTIONAL: Secret env vars (local/kind)
# ==========================================
secretEnvAsEnv: false

secretEnv:
  SERPER_API_KEY: ""

# ==========================================
# OPTIONAL: Persistent Volume Configuration
# ==========================================
pvc:
  storageClassName: null

# ==========================================
# APP-LEVEL DEFAULTS
# ==========================================
# These defaults apply to app configurations when specific values aren't provided
# This reduces boilerplate in values files - only specify what's different!
appDefaults:
  # Default replica count
  replicaCount: 1

  # Default service type
  service:
    type: ClusterIP

  # Default service monitor (disabled)
  serviceMonitor:
    enabled: false

  # Default service account
  serviceAccount:
    create: true
    annotations: {}

  # Default autoscaling (disabled)
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 80

  # Default security contexts
  podSecurityContext: {}
  securityContext: {}

  # Default image pull policy
  image:
    pullPolicy: IfNotPresent

  # Default ingress settings (target-specific values applied by generator)
  ingress:
    className: ""
    annotations: {}
    tls: []

  podAnnotations: {}

# ==========================================
# REQUIRED: Applications
# ==========================================
# Define at least one application
# Apps inherit from appDefaults but can override any value
# See example.yaml for complete configuration options
apps: {}
  # Minimal example (with defaults):
  # backend:
  #   enabled: true
  #   image:
  #     repository: my-registry.example.com/my-project
  #     name: my-app-backend
  #     tag: "0.0.1"
  #   ports:
  #     - containerPort: 8000
  #       name: http
  #   service:
  #     port: 8000
  #     targetPort: 8000
  #   env:
  #     ENV: stg
  #     PORT: "8000"
  #   resources:
  #     requests:
  #       cpu: 500m
  #       memory: 512Mi
  #     limits:
  #       cpu: 1000m
  #       memory: 1Gi
  #   healthCheck:
  #     enabled: true
  #     # ... health check config
  #   labels:
  #     component: backend
  #   ingress:
  #     enabled: true
  #     hosts:
  #       - host: backend.example.com
  #         paths:
  #           - path: /
  #             pathType: Prefix
  #
  # All defaults (service.type, serviceAccount, autoscaling, etc.) are inherited!
