{{- range $appName, $appConfig := .Values.apps }}
{{- if $appConfig.enabled }}
{{- $defaults := $.Values.appDefaults | default dict }}
{{- $defaultServiceAccount := $defaults.serviceAccount | default dict }}
{{- $appServiceAccount := $appConfig.serviceAccount | default dict }}
{{- $createSA := $appServiceAccount.create | default $defaultServiceAccount.create | default true }}
{{- if $createSA }}
{{- /* Merge service account annotations */ -}}
{{- $defaultAnnotations := $defaultServiceAccount.annotations | default dict }}
{{- $appAnnotations := $appServiceAccount.annotations | default dict }}
{{- $mergedAnnotations := mustMerge (deepCopy $appAnnotations) (deepCopy $defaultAnnotations) }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "aiq.appFullname" (list $ $appName) }}
  namespace: {{ include "aiq.namespace" $ }}
  labels:
    {{- include "aiq.appLabels" (list $ $appName $appConfig) | nindent 4 }}
  {{- with $mergedAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
{{- end }}
{{- end }}
{{- if and .Values.externalSecrets (index .Values.externalSecrets "enabled") }}
---
# Dedicated ServiceAccount for Vault authentication
# Automatically created when externalSecrets.enabled is true
# Used by External Secrets Operator to authenticate with Vault via JWT
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault-service-account
  namespace: {{ include "aiq.namespace" . }}
  labels:
    {{- include "aiq.labels" . | nindent 4 }}
    component: vault-service
{{- end }}
