{{- range $appName, $appConfig := .Values.apps }}
{{- if $appConfig.enabled }}
{{- $defaults := $.Values.appDefaults | default dict }}
{{- $defaultService := $defaults.service | default dict }}
{{- $appService := $appConfig.service | default dict }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "aiq.appFullname" (list $ $appName) }}
  namespace: {{ include "aiq.namespace" $ }}
  labels:
    {{- include "aiq.appLabels" (list $ $appName $appConfig) | nindent 4 }}
  {{- with $appService.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ $appService.type | default $defaultService.type | default "ClusterIP" }}
  {{- if $appService.ports }}
  ports:
  {{- range $appService.ports }}
  {{- $resolvedTarget := .targetPort | default .port }}
  - port: {{ .port }}
    {{- if ne ($resolvedTarget | toString) (.port | toString) }}
    targetPort: {{ $resolvedTarget }}
    {{- end }}
    protocol: {{ .protocol | default "TCP" }}
    name: {{ .name }}
    {{- if .nodePort }}
    nodePort: {{ .nodePort }}
    {{- end }}
  {{- end }}
  {{- else }}
  ports:
  {{- $appPort := include "aiq.appPort" (list $appConfig) }}
  {{- $svcPort := $appService.port | default $appPort }}
  {{- $svcTargetPort := $appService.targetPort | default $appPort }}
  - port: {{ $svcPort }}
    {{- if ne ($svcTargetPort | toString) ($svcPort | toString) }}
    targetPort: {{ $svcTargetPort }}
    {{- end }}
    protocol: TCP
    name: http
  {{- end }}
  selector:
    {{- include "aiq.appSelectorLabels" (list $ $appName) | nindent 4 }}
{{- end }}
{{- end }}
