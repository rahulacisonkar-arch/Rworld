# Deep Agent Workflow Configuration
# Full workflow with intent classification, depth routing, and research agents. Nemotron on integrate.api; add judge (OpenAI or Gemini) for evaluator.

general:
  telemetry:
    logging:
      console:
        _type: console
        level: INFO

llms:
  nemotron_llm_intent:
    _type: nim
    model_name: nvidia/nemotron-3-nano-30b-a3b
    base_url: "https://integrate.api.nvidia.com/v1"
    temperature: 0.7
    top_p: 0.7
    max_tokens: 8192
    num_retries: 5
    chat_template_kwargs:
      enable_thinking: false

  nemotron_nano_llm:
    _type: nim
    model_name: nvidia/nemotron-3-nano-30b-a3b
    base_url: "https://integrate.api.nvidia.com/v1"
    temperature: 1.0
    top_p: 1.0
    max_tokens: 128000
    num_retries: 5
    chat_template_kwargs:
      enable_thinking: true

  gpt_oss_llm:
    _type: nim
    model_name: openai/gpt-oss-120b
    base_url: "https://integrate.api.nvidia.com/v1"
    temperature: 1.0
    top_p: 1.0
    max_tokens: 256000
    api_key: ${NVIDIA_API_KEY}
    max_retries: 10

  # Nemotron Super is compatible and tested with AIQ but has limited availability
  # on the Build API due to high demand.
  # Uncomment nemotron_super_llm below if the endpoint is accessible.
  # nemotron_super_llm:
  #   _type: nim
  #   model_name: nvidia/nemotron-3-super-120b-a12b
  #   base_url: "https://integrate.api.nvidia.com/v1"
  #   temperature: 1.0
  #   top_p: 1.0
  #   max_tokens: 128000
  #   num_retries: 5
  #   chat_template_kwargs:
  #     enable_thinking: true

  # Judge model for evaluator: set OPENAI_API_KEY or add a Gemini LLM and set evaluators.freshqa.llm_name.
  judge_llm:
    _type: openai
    model_name: "gpt-4o"
    api_key: ${OPENAI_API_KEY}
    temperature: 0.1

functions:
  web_search_tool:
    _type: tavily_internet_search
    max_results: 5

  intent_classifier:
    _type: intent_classifier
    llm: nemotron_llm_intent

  shallow_research_agent:
    _type: shallow_research_agent
    llm: nemotron_nano_llm
    tools:
      - web_search_tool
    max_llm_turns: 10
    max_tool_iterations: 5
    verbose: true

  deep_research_agent:
    _type: deep_research_agent
    orchestrator_llm: gpt_oss_llm
    researcher_llm: nemotron_nano_llm  # replace with nemotron_super_llm if available
    planner_llm: gpt_oss_llm
    max_loops: 2
    tools:
      - web_search_tool

workflow:
  _type: chat_deepresearcher_agent
  enable_escalation: true
  verbose: true
  tools:
    - web_search_tool

eval:
  general:
    workflow_alias: "freshqa_eval_full_workflow_with_intent_classifier_and_depth_router"
    output_dir: frontends/benchmarks/freshqa/results
    max_concurrency: 1
    dataset:
      _type: json
      file_path: frontends/benchmarks/freshqa/data/FreshQA_v112425.json
      structure:
        question_key: question
        answer_key: expected_output
        generated_answer_key: generated_answer

  evaluators:
    freshqa:
      _type: freshqa_evaluator
      llm_name: judge_llm
      dataset_file: frontends/benchmarks/freshqa/data/FreshQA_v112425.json
