Deep Research Debug Console
============================
- API: /v1/jobs/async (agent-agnostic async job routes)
- Checkpointing: SQLite (local) or PostgreSQL (production)
- HITL: interrupt_after: [planner-agent] for plan approval

Usage:
1. Connect via WebSocket to submit queries
2. Deep research queries trigger async jobs
3. Jobs support pause/resume via HITL checkpoints
-->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Deep Research Debug Console</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600;700&display=swap');

      :root {
        --bg-primary: #0a0c10;
        --bg-secondary: #0f1218;
        --bg-tertiary: #151a22;
        --bg-card: #1a1f2a;
        --border: #262d3a;
        --border-active: #76b900;
        --text-primary: #e8eaed;
        --text-secondary: #9aa4b8;
        --text-muted: #6b7588;
        --accent: #76b900;
        --accent-dim: #5c9400;
        --success: #22c55e;
        --warning: #f59e0b;
        --error: #ef4444;
        --info: #3b82f6;
        --purple: #a855f7;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 0;
        background: var(--bg-primary);
        color: var(--text-primary);
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        height: 100vh;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }

      header {
        padding: 10px 16px;
        border-bottom: 1px solid var(--border);
        background: var(--bg-secondary);
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
      }

      .logo {
        font-weight: 700;
        font-size: 14px;
        color: var(--accent);
        margin-right: 8px;
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .logo svg {
        width: 20px;
        height: 20px;
      }

      .input-group {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      .input-group label {
        font-size: 10px;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .input-group input {
        padding: 6px 10px;
        border-radius: 6px;
        border: 1px solid var(--border);
        background: var(--bg-primary);
        color: var(--text-primary);
        font-size: 12px;
        min-width: 160px;
        font-family: 'JetBrains Mono', monospace;
      }

      .input-group input:focus {
        outline: none;
        border-color: var(--accent);
      }

      .btn {
        padding: 6px 12px;
        border-radius: 6px;
        border: 1px solid var(--border);
        background: var(--bg-tertiary);
        color: var(--text-primary);
        cursor: pointer;
        font-size: 12px;
        font-weight: 500;
        transition: all 0.15s ease;
      }

      .btn:hover {
        background: var(--bg-card);
        border-color: var(--text-muted);
      }

      .btn-primary {
        background: var(--accent);
        border-color: var(--accent);
        color: #000;
      }

      .btn-primary:hover {
        background: var(--accent-dim);
        border-color: var(--accent-dim);
      }

      .btn-danger {
        border-color: var(--error);
        color: var(--error);
      }

      .btn-danger:hover {
        background: var(--error);
        color: white;
      }

      .status-indicator {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 4px 10px;
        border-radius: 999px;
        background: var(--bg-tertiary);
        border: 1px solid var(--border);
        font-size: 11px;
      }

      .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--text-muted);
      }

      .status-dot.connected {
        background: var(--success);
        box-shadow: 0 0 8px var(--success);
      }

      .status-dot.streaming {
        background: var(--accent);
        box-shadow: 0 0 8px var(--accent);
        animation: pulse 1.5s infinite;
      }

      .status-dot.failed {
        background: #f44336;
        box-shadow: 0 0 8px #f44336;
      }

      .stream-mode-badge {
        display: flex;
        align-items: center;
        gap: 4px;
        padding: 3px 8px;
        border-radius: 999px;
        font-size: 10px;
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .stream-mode-badge.pubsub {
        background: rgba(168, 85, 247, 0.2);
        border: 1px solid var(--purple);
        color: var(--purple);
      }

      .stream-mode-badge.polling {
        background: rgba(245, 158, 11, 0.2);
        border: 1px solid var(--warning);
        color: var(--warning);
      }

      .stream-mode-badge .latency {
        font-family: 'JetBrains Mono', monospace;
        font-size: 9px;
        opacity: 0.9;
      }

      .latency-indicator {
        display: flex;
        align-items: center;
        gap: 4px;
        padding: 3px 8px;
        border-radius: 999px;
        background: var(--bg-tertiary);
        border: 1px solid var(--border);
        font-size: 10px;
        font-family: 'JetBrains Mono', monospace;
      }

      .latency-indicator.fast {
        border-color: var(--success);
        color: var(--success);
      }

      .latency-indicator.medium {
        border-color: var(--warning);
        color: var(--warning);
      }

      .latency-indicator.slow {
        border-color: var(--error);
        color: var(--error);
      }

      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
      }

      main {
        display: flex;
        flex: 1;
        min-height: 0;
      }

      .panel-chat {
        width: 360px;
        min-width: 280px;
        max-width: 600px;
      }

      .panel-state {
        flex: 1;
        min-width: 350px;
      }

      .panel-console {
        width: 380px;
        min-width: 280px;
        max-width: 600px;
      }

      .resize-handle {
        width: 6px;
        background: var(--bg-tertiary);
        cursor: col-resize;
        flex-shrink: 0;
        position: relative;
        transition: background 0.15s ease;
      }

      .resize-handle:hover,
      .resize-handle.dragging {
        background: var(--accent);
      }

      .resize-handle::after {
        content: '';
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 2px;
        height: 40px;
        background: var(--border);
        border-radius: 1px;
        transition: background 0.15s ease;
      }

      .resize-handle:hover::after,
      .resize-handle.dragging::after {
        background: var(--bg-primary);
      }

      body.resizing {
        cursor: col-resize;
        user-select: none;
      }

      body.resizing * {
        cursor: col-resize !important;
        user-select: none !important;
      }

      .panel {
        display: flex;
        flex-direction: column;
        min-height: 0;
        background: var(--bg-secondary);
        overflow: hidden;
      }

      .panel-header {
        padding: 10px 12px;
        border-bottom: 1px solid var(--border);
        background: var(--bg-tertiary);
        font-weight: 600;
        font-size: 13px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }

      .panel-tabs {
        display: flex;
        gap: 2px;
      }

      .panel-tab {
        padding: 4px 10px;
        border-radius: 4px;
        font-size: 11px;
        cursor: pointer;
        color: var(--text-secondary);
        background: transparent;
        border: none;
        transition: all 0.15s ease;
      }

      .panel-tab:hover {
        background: var(--bg-card);
      }

      .panel-tab.active {
        background: var(--accent);
        color: #000;
        font-weight: 600;
      }

      .panel-content {
        flex: 1;
        overflow: auto;
        min-height: 0;
      }

      .chat-messages {
        padding: 12px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .bubble {
        max-width: 90%;
        padding: 10px 12px;
        border-radius: 12px;
        line-height: 1.5;
        font-size: 13px;
      }

      .bubble.user {
        align-self: flex-end;
        background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dim) 100%);
        color: #000;
        border-bottom-right-radius: 4px;
      }

      .bubble.assistant {
        align-self: flex-start;
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-bottom-left-radius: 4px;
      }

      .bubble p { margin: 0; }
      .bubble p + p { margin-top: 8px; }
      .bubble code {
        background: rgba(0, 0, 0, 0.3);
        padding: 1px 4px;
        border-radius: 3px;
        font-family: 'JetBrains Mono', monospace;
        font-size: 12px;
      }
      .bubble pre {
        background: rgba(0, 0, 0, 0.3);
        padding: 8px;
        border-radius: 6px;
        overflow-x: auto;
        font-family: 'JetBrains Mono', monospace;
        font-size: 11px;
      }

      .composer {
        padding: 10px;
        border-top: 1px solid var(--border);
        display: flex;
        gap: 8px;
      }

      .composer-meta {
        padding: 8px 10px 0;
        display: flex;
        flex-direction: column;
        gap: 6px;
        font-size: 11px;
        color: var(--text-secondary);
      }

      .composer-meta-row {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .composer-meta-list {
        display: flex;
        flex-wrap: wrap;
        gap: 6px 10px;
      }

      .composer-meta-list label {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
      }

      .composer-meta input[type="text"] {
        padding: 6px 10px;
        border-radius: 6px;
        border: 1px solid var(--border);
        background: var(--bg-primary);
        color: var(--text-primary);
        font-size: 12px;
      }

      .composer-meta input:focus {
        outline: none;
        border-color: var(--accent);
      }

      .composer input {
        flex: 1;
        padding: 10px 12px;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: var(--bg-primary);
        color: var(--text-primary);
        font-size: 13px;
      }

      .composer input:focus {
        outline: none;
        border-color: var(--accent);
      }

      .loading-bar {
        height: 2px;
        background: var(--bg-tertiary);
        overflow: hidden;
      }

      .loading-bar.active::after {
        content: '';
        display: block;
        height: 100%;
        width: 30%;
        background: linear-gradient(90deg, transparent, var(--accent), transparent);
        animation: loading 1s ease-in-out infinite;
      }

      @keyframes loading {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(400%); }
      }

      .state-grid {
        padding: 12px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .state-card {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 10px;
        overflow: hidden;
      }

      .state-card-header {
        padding: 8px 12px;
        background: var(--bg-tertiary);
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
        cursor: pointer;
      }

      .state-card-header h4 {
        margin: 0;
        font-size: 12px;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .state-card-badge {
        font-size: 10px;
        padding: 2px 6px;
        border-radius: 999px;
        background: var(--bg-primary);
        color: var(--text-secondary);
      }

      .state-card-body {
        padding: 10px 12px;
        font-size: 12px;
        overflow: hidden;
        max-width: 100%;
        word-wrap: break-word;
        overflow-wrap: break-word;
      }

      .state-card.collapsed .state-card-body {
        display: none;
      }

      .subagent-row {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px 0;
        border-bottom: 1px solid var(--border);
      }

      .subagent-row:last-child {
        border-bottom: none;
      }

      .subagent-icon {
        width: 32px;
        height: 32px;
        border-radius: 8px;
        background: var(--bg-tertiary);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
      }

      .subagent-icon.running {
        background: var(--accent);
        color: #000;
      }

      .subagent-info {
        flex: 1;
        min-width: 0;
        overflow: hidden;
      }

      .subagent-name {
        font-weight: 500;
        font-size: 12px;
      }

      .subagent-task {
        font-size: 11px;
        color: var(--text-secondary);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .subagent-status {
        font-size: 10px;
        padding: 2px 8px;
        border-radius: 999px;
        background: var(--bg-tertiary);
      }

      .subagent-status.running {
        background: rgba(118, 185, 0, 0.2);
        color: var(--accent);
      }

      .agent-card {
        margin-bottom: 12px;
        border-radius: 8px;
        background: var(--bg-tertiary);
        overflow: hidden;
      }

      .agent-card.running {
        box-shadow: 0 0 0 1px var(--accent);
      }

      .agent-card > summary {
        list-style: none;
        cursor: pointer;
      }

      .agent-card > summary::-webkit-details-marker {
        display: none;
      }

      .agent-card > summary::before {
        content: '▶';
        font-size: 8px;
        color: var(--text-muted);
        margin-right: 6px;
        transition: transform 0.2s;
      }

      .agent-card[open] > summary::before {
        transform: rotate(90deg);
      }

      .agent-body {
        padding: 0 12px 12px 12px;
        border-top: 1px solid var(--border-subtle);
      }

      .agent-header {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 12px;
      }

      .agent-tasks-badge {
        font-size: 9px;
        background: var(--bg-card);
        padding: 2px 6px;
        border-radius: 4px;
        color: var(--text-muted);
        margin-left: 6px;
      }

      .agent-nested-tasks {
        padding: 0 12px 12px 44px;
      }

      .task-details {
        margin-bottom: 8px;
        border-radius: 6px;
        background: var(--bg-card);
        border-left: 3px solid var(--border);
      }

      .task-details.running {
        border-left-color: var(--accent);
      }

      .task-details.complete {
        border-left-color: var(--success);
      }

      .task-details[open] {
        background: var(--bg-secondary);
      }

      .task-summary {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 10px;
        cursor: pointer;
        font-size: 11px;
        list-style: none;
      }

      .task-summary::-webkit-details-marker {
        display: none;
      }

      .task-icon {
        font-size: 12px;
      }

      .task-title {
        font-weight: 600;
        color: var(--text-primary);
      }

      .task-meta {
        margin-left: auto;
        font-size: 10px;
        color: var(--text-muted);
      }

      .task-body {
        padding: 0 10px 10px 26px;
      }

      .task-focus {
        font-size: 11px;
        color: var(--text-secondary);
        margin-bottom: 8px;
      }

      .query-list {
        border-top: 1px solid var(--border);
        padding-top: 8px;
      }

      .query-item {
        display: flex;
        align-items: flex-start;
        gap: 8px;
        padding: 4px 0;
        font-size: 10px;
      }

      .query-check {
        flex-shrink: 0;
        width: 14px;
        text-align: center;
      }

      .query-item.complete .query-check {
        color: var(--success);
      }

      .query-item.running .query-check {
        color: var(--accent);
      }

      .query-text {
        color: var(--text-secondary);
        word-break: break-word;
      }

      .task-time {
        font-size: 9px;
        color: var(--text-muted);
        margin-top: 6px;
        padding-top: 6px;
        border-top: 1px solid var(--border);
      }

      .todo-item {
        display: flex;
        align-items: flex-start;
        gap: 8px;
        padding: 6px 0;
        border-bottom: 1px solid var(--border);
      }

      .todo-item:last-child {
        border-bottom: none;
      }

      .todo-check {
        width: 16px;
        height: 16px;
        border-radius: 4px;
        border: 2px solid var(--border);
        margin-top: 2px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 10px;
      }

      .todo-check.completed {
        background: var(--success);
        border-color: var(--success);
        color: white;
      }

      .todo-check.in_progress {
        border-color: var(--accent);
        animation: pulse 1.5s infinite;
      }

      .todo-text {
        flex: 1;
        font-size: 12px;
      }

      .todo-text.completed {
        color: var(--text-muted);
        text-decoration: line-through;
      }

      .file-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 8px;
      }

      .file-item {
        padding: 8px;
        background: var(--bg-tertiary);
        border-radius: 6px;
        font-size: 11px;
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .file-icon {
        font-size: 14px;
      }

      .report-preview {
        line-height: 1.6;
        font-size: 13px;
        overflow-y: auto;
      }

      .report-preview h1, .report-preview h2, .report-preview h3 {
        margin: 12px 0 8px 0;
        color: var(--accent);
      }

      .report-preview h1 { font-size: 18px; }
      .report-preview h2 { font-size: 15px; }
      .report-preview h3 { font-size: 13px; }

      .report-full {
        flex: 1;
        display: flex;
        flex-direction: column;
      }

      .report-full .state-card {
        flex: 1;
        display: flex;
        flex-direction: column;
      }

      .report-full .state-card-body {
        flex: 1;
        overflow-y: auto;
      }

      .view-report-btn {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 8px 14px;
        background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dim) 100%);
        color: #000;
        border: none;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s ease;
      }

      .view-report-btn:hover {
        transform: translateY(-1px);
        box-shadow: 0 4px 12px rgba(118, 185, 0, 0.3);
      }

      .view-stream-btn {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 8px 14px;
        background: linear-gradient(135deg, var(--info) 0%, #2563eb 100%);
        color: #fff;
        border: none;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s ease;
      }

      .view-stream-btn:hover {
        transform: translateY(-1px);
        box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
      }

      .research-complete-bubble {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .research-complete-bubble .status-text {
        font-size: 13px;
        color: var(--text-secondary);
      }

      .research-complete-bubble .button-row {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .tool-call-item {
        background: var(--bg-tertiary);
        border: 1px solid var(--border);
        border-radius: 8px;
        margin-bottom: 8px;
        overflow: hidden;
        max-width: 100%;
        box-sizing: border-box;
      }

      .tool-call-header {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 10px;
        cursor: pointer;
        transition: background 0.15s ease;
      }

      .tool-call-header:hover {
        background: var(--bg-card);
      }

      .tool-call-icon {
        width: 24px;
        height: 24px;
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        flex-shrink: 0;
      }

      .tool-call-icon.search { background: rgba(59, 130, 246, 0.2); color: var(--info); }
      .tool-call-icon.code { background: rgba(168, 85, 247, 0.2); color: var(--purple); }
      .tool-call-icon.file { background: rgba(34, 197, 94, 0.2); color: var(--success); }
      .tool-call-icon.default { background: rgba(118, 185, 0, 0.2); color: var(--accent); }

      .tool-call-info {
        flex: 1;
        min-width: 0;
        overflow: hidden;
      }

      .tool-call-name {
        font-weight: 600;
        font-size: 12px;
        color: var(--text-primary);
      }

      .tool-call-preview {
        font-size: 10px;
        color: var(--text-muted);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .tool-call-time {
        font-size: 9px;
        color: var(--text-muted);
        flex-shrink: 0;
      }

      .tool-call-expand {
        font-size: 10px;
        color: var(--text-muted);
        transition: transform 0.2s ease;
      }

      .tool-call-item.expanded .tool-call-expand {
        transform: rotate(180deg);
      }

      .tool-call-details {
        display: none;
        padding: 0 10px 10px 10px;
        border-top: 1px solid var(--border);
        overflow: hidden;
        max-width: 100%;
      }

      .tool-call-item.expanded .tool-call-details {
        display: block;
      }

      .tool-call-section {
        margin-top: 8px;
        overflow: hidden;
        max-width: 100%;

      .job-banner {

      .source-link {

    </style>
  </head>
  <body>
    <header>
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
        Deep Research Debug
      </div>
      <div class="input-group">
        <label>WebSocket URL</label>

    <main>
      <section class="panel panel-chat">
        <div class="panel-header">
          <span>💬 Chat</span>
          <div id="loadingIndicator" class="hidden" style="font-size: 11px; color: var(--accent);">

        <div class="chat-history-section" id="sessionInfoBar" style="display: none;">

      <div class="resize-handle" id="resizeHandle1" data-left=".panel-chat" data-right=".panel-state"></div>

            <button class="panel-tab" data-tab="report">Report</button>

        </div>
        <div class="panel-content">
          <div id="stateTab" class="state-grid">
            <div id="jobBannerContainer"></div>

            <div class="state-card">
              <div class="state-card-header" onclick="this.parentElement.classList.toggle('collapsed')">
                <h4>🤖 Agents <span class="state-card-badge" id="subagentCount">0</span></h4>
                <span style="font-size: 10px; color: var(--text-muted);">▼</span>
              </div>
              <div class="state-card-body" id="subagentsView"></div>
            </div>

            <div class="state-card">
              <div class="state-card-header" onclick="this.parentElement.classList.toggle('collapsed')">
                <h4>✅ Orchestrator Tasks <span class="state-card-badge" id="todoCount">0</span></h4>

              </div>
              <div class="state-card-body" id="todosView"></div>

              <div class="state-card-header" onclick="this.parentElement.classList.toggle('collapsed')">
                <h4>📁 Files <span class="state-card-badge" id="fileCount">0</span></h4>

              <div class="state-card-header" onclick="this.parentElement.classList.toggle('collapsed')">
                <h4>⚡ Tool Calls <span class="state-card-badge" id="toolCallCount">0</span></h4>
                <span style="font-size: 10px; color: var(--text-muted);">▼</span>
              </div>
              <div class="state-card-body" id="toolCallsView" style="max-height: 300px; overflow-y: auto;"></div>
            </div>

            <div class="state-card">
              <div class="state-card-header" onclick="this.parentElement.classList.toggle('collapsed')">
                <h4>🧠 Reasoning</h4>
                <span style="font-size: 10px; color: var(--text-muted);">▼</span>
              </div>
              <div class="state-card-body mono" id="reasoningView" style="font-size: 11px; color: var(--text-secondary);"></div>
            </div>

            <div class="state-card">
              <div class="state-card-header" onclick="this.parentElement.classList.toggle('collapsed')">
                <h4>🔗 Sources <span class="state-card-badge" id="sourceCount">0</span></h4>
                <span style="font-size: 10px; color: var(--text-muted);">▼</span>
              </div>
              <div class="state-card-body" id="sourcesView"></div>
            </div>

            <div class="state-card collapsed">
              <div class="state-card-header" onclick="this.parentElement.classList.toggle('collapsed')">

                <span style="font-size: 10px; color: var(--text-muted);">▼</span>

              <div class="state-card-body mono" id="extraStateView" style="font-size: 10px; color: var(--text-secondary);"></div>

          <div id="reportTab" class="report-full hidden">

              <div class="state-card-body report-preview" id="reportView"></div>
            </div>

      <div class="resize-handle" id="resizeHandle2" data-left=".panel-state" data-right=".panel-console"></div>

      <section class="panel panel-console console-panel">
        <div class="panel-header">
          <span>📡 Console</span>
          <div style="display: flex; gap: 4px;">
            <button class="btn" id="copyWSBtn" style="padding: 4px 8px; font-size: 10px;">Copy WS</button>
            <button class="btn" id="copySSEBtn" style="padding: 4px 8px; font-size: 10px;">Copy SSE</button>
            <button class="btn" id="clearConsoleBtn" style="padding: 4px 8px; font-size: 10px;">Clear</button>
          </div>
        </div>
        <div class="console-toolbar">
          <input id="consoleFilter" placeholder="Filter logs..." />
        </div>
        <div class="panel-content">
          <div id="console" class="console-entries"></div>
        </div>
      </section>
    </main>

    <script>
      const wsUrlInput = document.getElementById('wsUrl');
      const httpBaseInput = document.getElementById('httpBase');

      // Auto-detect server URL from current page location
      (function initServerUrls() {
        const host = window.location.host || 'localhost:8000';
        const isSecure = window.location.protocol === 'https:';
        const wsProtocol = isSecure ? 'wss:' : 'ws:';
        const httpProtocol = isSecure ? 'https:' : 'http:';

        wsUrlInput.value = `${wsProtocol}//${host}/websocket`;
        httpBaseInput.value = `${httpProtocol}//${host}`;
      })();

      const conversationIdInput = document.getElementById('conversationId');
      const idTokenInput = document.getElementById('idToken');
      const connectBtn = document.getElementById('connectBtn');
      const disconnectBtn = document.getElementById('disconnectBtn');
      const saveTokenBtn = document.getElementById('saveTokenBtn');
      const clearConsoleBtn = document.getElementById('clearConsoleBtn');
      const copySSEBtn = document.getElementById('copySSEBtn');
      const copyWSBtn = document.getElementById('copyWSBtn');
      const statusDot = document.getElementById('statusDot');
      const statusText = document.getElementById('statusText');
      const streamModeBadge = document.getElementById('streamModeBadge');
      const streamModeText = document.getElementById('streamModeText');
      const streamModeLatency = document.getElementById('streamModeLatency');
      const latencyIndicator = document.getElementById('latencyIndicator');
      const latencyValue = document.getElementById('latencyValue');
      const loadingIndicator = document.getElementById('loadingIndicator');
      const loadingBar = document.getElementById('loadingBar');
      const chatMessages = document.getElementById('chatMessages');
      const chatInput = document.getElementById('chatInput');
      const dataSourcesList = document.getElementById('dataSourcesList');
      const wrapJsonToggle = document.getElementById('wrapJsonToggle');
      const sendBtn = document.getElementById('sendBtn');
      const consoleEl = document.getElementById('console');
      const consoleFilter = document.getElementById('consoleFilter');
      const jobBannerContainer = document.getElementById('jobBannerContainer');
      const subagentsView = document.getElementById('subagentsView');
      const todosView = document.getElementById('todosView');
      const filesView = document.getElementById('filesView');
      const reasoningView = document.getElementById('reasoningView');
      const sourcesView = document.getElementById('sourcesView');
      const reportView = document.getElementById('reportView');
      const subagentCount = document.getElementById('subagentCount');
      const todoCount = document.getElementById('todoCount');
      const fileCount = document.getElementById('fileCount');
      const sourceCount = document.getElementById('sourceCount');
      const stateTab = document.getElementById('stateTab');
      const reportTab = document.getElementById('reportTab');

      let socket = null;
      let conversationId = '';
      let lastInProgressText = '';
      let filterText = '';
      let activeJobId = '';
      let eventSource = null;
      let lastEventId = null;
      let sseEvents = [];
      let wsEvents = [];
      let reconnectAttempts = 0;
      let reconnectTimer = null;
      let currentSessionActive = false;
      let currentStreamMode = null;
      let lastEventTimestamp = null;
      let latencyHistory = [];
      const MAX_LATENCY_SAMPLES = 20;
      let jobInProgress = false;
      let pendingInteraction = null; // Track interaction context for clarifier responses
      const MAX_RECONNECT_ATTEMPTS = 5;
      const MAX_SSE_EVENTS = 1000;
      const MAX_WS_EVENTS = 1000;
      const MAX_TOOL_CALLS = 500;
      const SESSION_KEY = 'deep_research_session';

      function setInputEnabled(enabled) {
        jobInProgress = !enabled;
        chatInput.disabled = !enabled;
        sendBtn.disabled = !enabled;
        if (!enabled) {
          chatInput.placeholder = 'Report generation in progress...';
          sendBtn.style.opacity = '0.5';
        } else {
          chatInput.placeholder = 'Type a message...';
          sendBtn.style.opacity = '1';
        }
      }

      function renderDataSources(options) {
        if (!dataSourcesList) return;
        dataSourcesList.innerHTML = '';
        // Filter out Knowledge Base - it's always included by default on backend
        const filtered = options.filter(s =>
          s.id !== 'knowledge_search' &&
          s.name?.toLowerCase() !== 'knowledge base'
        );
        const sorted = [...filtered].sort((a, b) => a.name.localeCompare(b.name));
        sorted.forEach((source, index) => {
          const label = document.createElement('label');
          const checkbox = document.createElement('input');
          checkbox.type = 'checkbox';
          checkbox.value = source.id;
          checkbox.checked = source.id === 'web_search';  // Default to web_search
          checkbox.id = `ds_${index}_${source.id}`;
          label.appendChild(checkbox);
          const text = document.createElement('span');
          text.textContent = source.name;
          label.appendChild(text);
          dataSourcesList.appendChild(label);
        });
      }

      async function loadDataSources() {
        if (!httpBaseInput?.value) {
          renderDataSources([{ id: 'web_search', name: 'Web Search' }]);
          return;
        }
        try {
          const base = httpBaseInput.value.replace(/\/$/, '');
          const res = await fetch(`${base}/v1/data_sources`);
          if (!res.ok) {
            throw new Error(`HTTP ${res.status}`);
          }
          const sources = await res.json();
          if (!Array.isArray(sources) || sources.length === 0) {
            throw new Error('Empty data source list');
          }
          renderDataSources(sources);
        } catch (err) {
          renderDataSources([{ id: 'web_search', name: 'Web Search' }]);
          appendConsole('warn', { warning: 'Failed to load data sources', error: String(err) });
        }
      }

      function getSelectedDataSources() {
        if (!dataSourcesList) return [];
        const checked = Array.from(
          dataSourcesList.querySelectorAll('input[type="checkbox"]:checked')
        ).map(el => el.value);
        return checked.filter(Boolean);
      }

      function loadSession() {
        try {
          const data = sessionStorage.getItem(SESSION_KEY);
          return data ? JSON.parse(data) : null;
        } catch (e) {
          console.error('Failed to load session:', e);
          return null;
        }
      }

      function saveSession(session) {
        try {
          sessionStorage.setItem(SESSION_KEY, JSON.stringify(session));
          updateSessionInfoBar();
        } catch (e) {
          console.error('Failed to save session:', e);
        }
      }

      function savePendingInteraction(interaction) {
        let session = loadSession();
        if (!session) {
          session = createSession();
        }
        session.pending_interaction = interaction;
        saveSession(session);
      }

      function clearPendingInteraction() {
        const session = loadSession();
        if (session?.pending_interaction) {
          delete session.pending_interaction;
          saveSession(session);
        }
      }

      function createSession() {
        const session = {
          timestamp: new Date().toISOString(),
          messages: [],
          reports: [],
        };
        saveSession(session);
        currentSessionActive = true;
        return session;
      }

      function addReportToSession(jobId, query) {
        let session = loadSession();
        if (!session) {
          session = createSession();
        }
        session.reports = session.reports || [];
        if (!session.reports.find(r => r.jobId === jobId)) {
          session.reports.push({
            jobId: jobId,
            query: query,
            timestamp: new Date().toISOString(),
            status: 'running',
          });
          saveSession(session);
        }
      }

      function updateReportStatus(jobId, status) {
        const session = loadSession();
        if (session && session.reports) {
          const report = session.reports.find(r => r.jobId === jobId);
          if (report) {
            report.status = status;
            saveSession(session);
          }
        }
      }

      function addMessageToSession(role, content, options = {}) {
        let session = loadSession();
        if (!session) {
          session = createSession();
        }
        session.messages = session.messages || [];
        session.messages.push({ role, content, options, timestamp: new Date().toISOString() });
        saveSession(session);
      }

      function clearSession() {
        sessionStorage.removeItem(SESSION_KEY);
        sessionStorage.removeItem('conversation_id');  // Clear persisted conversation ID
        conversationId = '';  // Reset the variable so a new ID is generated
        currentSessionActive = false;
        jobInProgress = false;
        pendingInteraction = null;
        setInputEnabled(true);
        resetState();
        chatMessages.innerHTML = '';
        updateSessionInfoBar();
      }

      function restoreSession() {
        const session = loadSession();
        if (!session) return false;

        currentSessionActive = true;

        (session.messages || []).forEach(msg => {
          appendChat(msg.role, msg.content, msg.options || {}, false);
        });

        const reports = session.reports || [];
        const lastRunningReport = reports.find(r => r.status === 'running');
        const lastPausedReport = reports.find(r => r.status === 'paused' || r.status === 'interrupted');
        const lastActiveReport = lastRunningReport || lastPausedReport;

        if (lastActiveReport) {
          activeJobId = lastActiveReport.jobId;
          if (lastActiveReport.status === 'running') {
            showJobBanner(lastActiveReport.jobId);
            setInputEnabled(false);
            startStream(lastActiveReport.jobId);
          } else {
            showJobBanner(lastActiveReport.jobId, 'paused');
            setStatus('Paused', true, false);
            setInputEnabled(true);
            setLoading(false);
          }
        }

        if (session.pending_interaction) {
          pendingInteraction = session.pending_interaction;
          setInputEnabled(true);
          setLoading(false);
        }

        updateSessionInfoBar();
        return true;
      }

      function updateSessionInfoBar() {
        const session = loadSession();
        const bar = document.getElementById('sessionInfoBar');
        const info = document.getElementById('sessionInfo');
        if (!bar || !info) return;

        const reportCount = session?.reports?.length || 0;
        const messageCount = session?.messages?.length || 0;

        if (reportCount > 0 || messageCount > 0) {
          const runningCount = (session.reports || []).filter(r => r.status === 'running').length;
          const completeCount = (session.reports || []).filter(r => r.status === 'complete').length;
          let statusText = '';
          if (runningCount > 0) statusText = `⏳ ${runningCount} running`;
          else if (completeCount > 0) statusText = `✅ ${completeCount} report${completeCount > 1 ? 's' : ''}`;
          info.innerHTML = `${statusText} • ${messageCount} messages`;
          bar.style.display = 'block';
        } else {
          bar.style.display = 'none';
        }
      }

      const cachedState = {
        subagents: [],
        todos: [],
        files: {},
        reasoning: '',
        sources: [],
        discoveredSources: [],
        report: '',
        queryPlans: [],
        subagentTasks: [],
        extraState: {},
        toolCalls: [],
        seenToolCallIds: new Set(),
        _streamingContent: '',
      };

      const extraStateView = document.getElementById('extraStateView');
      const toolCallsView = document.getElementById('toolCallsView');

      function switchToTab(tabName) {
        document.querySelectorAll('.panel-tab').forEach(t => {
          t.classList.toggle('active', t.dataset.tab === tabName);
        });
        stateTab.classList.toggle('hidden', tabName !== 'state');
        reportTab.classList.toggle('hidden', tabName !== 'report');
      }

      document.querySelectorAll('.panel-tab').forEach(tab => {
        tab.addEventListener('click', () => switchToTab(tab.dataset.tab));
      });

      function baseUrl() {
        return httpBaseInput.value.trim().replace(/\/$/, '');
      }

      function apiPath(endpoint) {
        // Routes use /job/{id}/... pattern for job-specific endpoints
        return `/v1/jobs/async/job${endpoint}`;
      }

      function setStatus(text, connected = false, streaming = false) {
        statusText.textContent = text;
        const failed = text.toLowerCase().includes('fail');
        statusDot.classList.toggle('connected', connected && !streaming && !failed);
        statusDot.classList.toggle('streaming', streaming);
        statusDot.classList.toggle('failed', failed);
      }

      function setLoading(active) {
        loadingIndicator.classList.toggle('hidden', !active);
        loadingBar.classList.toggle('active', active);
      }

      function setStreamMode(mode, intervalMs = null) {
        currentStreamMode = mode;
        streamModeBadge.style.display = mode ? 'flex' : 'none';

        if (mode === 'pubsub') {
          streamModeBadge.classList.remove('polling');
          streamModeBadge.classList.add('pubsub');
          streamModeText.textContent = 'Pub/Sub';
          streamModeLatency.textContent = '<10ms';
        } else if (mode === 'polling') {
          streamModeBadge.classList.remove('pubsub');
          streamModeBadge.classList.add('polling');
          streamModeText.textContent = 'Polling';
          streamModeLatency.textContent = intervalMs ? `${intervalMs}ms` : '500ms';
        }
      }

      function updateLatency(latencyMs) {
        latencyHistory.push(latencyMs);
        if (latencyHistory.length > MAX_LATENCY_SAMPLES) {
          latencyHistory.shift();
        }

        const avgLatency = Math.round(
          latencyHistory.reduce((a, b) => a + b, 0) / latencyHistory.length
        );

        latencyIndicator.style.display = 'flex';
        latencyValue.textContent = `${avgLatency}ms`;

        latencyIndicator.classList.remove('fast', 'medium', 'slow');
        if (avgLatency < 50) {
          latencyIndicator.classList.add('fast');
        } else if (avgLatency < 200) {
          latencyIndicator.classList.add('medium');
        } else {
          latencyIndicator.classList.add('slow');
        }
      }

      function resetStreamIndicators() {
        currentStreamMode = null;
        latencyHistory = [];
        streamModeBadge.style.display = 'none';
        latencyIndicator.style.display = 'none';
      }

      function setIdTokenCookie() {
        const token = idTokenInput.value.trim();
        if (!token) return;
        const secure = window.location.protocol === 'https:' ? '; Secure' : '';
        document.cookie = `idToken=${token}; path=/; SameSite=Lax; max-age=86400${secure}`;
      }

      function getCookieValue(name) {
        const match = document.cookie.match(new RegExp(`(^| )${name}=([^;]+)`));
        return match ? decodeURIComponent(match[2]) : '';
      }

      function loadStoredToken() {
        const token = getCookieValue('idToken');
        if (token) idTokenInput.value = token;
      }

      function getConversationId() {
        // Priority: 1) Manual input, 2) Stored in sessionStorage, 3) Generate new
        if (conversationIdInput.value.trim()) return conversationIdInput.value.trim();
        if (!conversationId) {
          // Try to restore from sessionStorage first
          const stored = sessionStorage.getItem('conversation_id');
          if (stored) {
            conversationId = stored;
          } else {
            conversationId = crypto.randomUUID?.() || `conv_${Date.now()}`;
            sessionStorage.setItem('conversation_id', conversationId);
          }
        }
        return conversationId;
      }

        return (text || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\n/g, '<br/>');

      async function viewStreamWithReplay(jobId) {
        if (!jobId) {
          appendConsole('error', { error: 'No job ID provided for stream replay' });
          return;
        }

        resetStateForReportView();

        activeJobId = jobId;
        lastEventId = 0;

        const jobStatus = await fetchJobStatus(jobId);
        const status = jobStatus?.status || 'complete';
        showJobBanner(jobId, status);

        setStatus('Loading stream...', true, true);
        appendConsole('http', { action: 'view_stream', job_id: jobId });

        switchToTab('state');

        startStreamReplay(jobId);
      }

      function startStreamReplay(jobId) {
        if (eventSource) {
          eventSource.close();
          eventSource = null;
        }

        activeJobId = jobId;
        lastEventId = 0;

        const streamPath = apiPath(`/${jobId}/stream`);
        const url = new URL(`${baseUrl()}${streamPath}`);

        try {
          eventSource = new EventSource(url.toString(), { withCredentials: true });
        } catch (e) {
          appendConsole('error', { error: `Failed to create EventSource: ${e.message}` });
          setStatus('Stream load failed', true, false);
          return;
        }

        setStatus('Replaying stream...', true, true);

        const startEvent = { event: 'stream.replay_start', job_id: jobId, timestamp: new Date().toISOString() };
        addSSEEvent(startEvent);
        appendConsole('sse', startEvent);

        let finalStatus = null;
        let eventCount = 0;

        const handleReplayEvent = evt => {
          eventCount++;
          if (evt.lastEventId) lastEventId = evt.lastEventId;
          let payload = evt.data;
          try { payload = JSON.parse(evt.data); } catch (e) {}

          const eventEntry = { event: evt.type, id: evt.lastEventId, data: payload, timestamp: new Date().toISOString() };
          addSSEEvent(eventEntry);
          appendConsole('sse', eventEntry);

          if (evt.type === 'job.status' && (payload?.status === 'success' || payload?.status === 'failure' || payload?.status === 'interrupted' || payload?.status === 'cancelled')) {
            finalStatus = payload?.status;
          } else if (evt.type === 'job.shutdown') {
            finalStatus = 'shutdown';
          } else if (evt.type === 'job.error') {
            finalStatus = 'error';
          }

          try {
            if (evt.type === 'workflow.start') {
              updateSubagentFromEvent(payload);
            }

            if (evt.type === 'workflow.end') {
              markSubagentComplete(payload);
            }

            if (evt.type === 'tool.start') {
              updateFromToolCall(payload);
            }

            if (evt.type === 'tool.end') {
              updateToolEndFromEvent(payload);
            }

            if (evt.type === 'llm.start') {
              updateLLMStartFromEvent(payload);
            }

            if (evt.type === 'llm.chunk') {
              updateLLMChunkFromEvent(payload);
            }

            if (evt.type === 'llm.end') {
              updateLLMEndFromEvent(payload);
            }

            if (evt.type === 'artifact.update') {
              handleArtifactUpdate(payload);
            }
          } catch (err) {
            console.error(`[Stream Replay Error] ${evt.type}:`, err, payload);
            appendConsole('error', { event: evt.type, error: err.message });
          }
        };

        const finalizeReplay = () => {
          closeStream();
          const statusLabel = finalStatus === 'success' ? 'Complete' : (finalStatus || 'complete');
          setStatus(`Stream replay: ${statusLabel} (${eventCount} events)`, true, false);
          showJobBanner(jobId, finalStatus === 'success' ? 'complete' : (finalStatus || 'complete'));

          if (finalStatus === 'success' || !finalStatus) {
            fetchReport(jobId).then(report => {
              if (report) {
                cachedState.report = report;
                renderReport(report);
              }
            });
          }

          appendConsole('sse', { event: 'stream.replay_complete', job_id: jobId, event_count: eventCount });
        };

        eventSource.onopen = () => {
          setStatus('Replaying stream...', true, true);
        };

        eventSource.onmessage = handleReplayEvent;
        [
          'job.status', 'job.error', 'job.paused', 'job.cancelled', 'job.shutdown',
          'workflow.start', 'workflow.end',
          'tool.start', 'tool.end',
          'llm.start', 'llm.chunk', 'llm.end',
          'artifact.update',
          'stream.mode'
        ].forEach(name => {
          eventSource.addEventListener(name, handleReplayEvent);
        });

        eventSource.onerror = (err) => {
          if (finalStatus || eventSource?.readyState === EventSource.CLOSED) {
            finalizeReplay();
            return;
          }
          if (eventCount > 0) {
            finalizeReplay();
            return;
          }
          appendConsole('error', { event: 'stream.replay_error', readyState: eventSource?.readyState });
          setStatus('Stream replay error', true, false);
          closeStream();
        };
      }

      function appendConsole(type, data, raw = null) {
        const entry = document.createElement('div');
        entry.className = `console-entry ${type}`;

        const meta = document.createElement('div');
        meta.className = 'console-meta';

        const tag = document.createElement('span');
        tag.className = `console-tag ${type}`;
        const tagLabels = { 'ws-in': 'WS IN', 'ws-out': 'WS OUT', 'sse': 'SSE', 'http': 'HTTP', 'error': 'ERROR' };
        tag.textContent = tagLabels[type] || type.toUpperCase();
        meta.appendChild(tag);

        const time = document.createElement('span');
        time.textContent = new Date().toLocaleTimeString();
        meta.appendChild(time);

        entry.appendChild(meta);

        const body = document.createElement('div');
        body.className = 'console-body';

        let parsed = null;
        const dataStr = typeof data === 'string' ? data : JSON.stringify(data, null, 2);
        try { parsed = JSON.parse(dataStr); } catch (e) {}

        if (parsed && typeof parsed === 'object') {
          const { content, ...rest } = parsed;
          const main = document.createElement('pre');
          main.textContent = JSON.stringify(rest, null, 2);
          body.appendChild(main);
          if (content !== undefined) {
            const details = document.createElement('details');
            const summary = document.createElement('summary');
            summary.textContent = 'content (collapsed)';
            const contentPre = document.createElement('pre');
            contentPre.textContent = JSON.stringify(content, null, 2);
            details.appendChild(summary);
            details.appendChild(contentPre);
            body.appendChild(details);
          }
        } else {
          body.textContent = dataStr;
        }

        entry.appendChild(body);
        entry.dataset.search = dataStr.toLowerCase();

        consoleEl.prepend(entry);
        applyFilter();
      }

      function applyFilter() {
        const filter = filterText.toLowerCase();
        consoleEl.querySelectorAll('.console-entry').forEach(entry => {
          const text = entry.dataset.search || '';
          entry.style.display = filter && !text.includes(filter) ? 'none' : '';
        });
      }

      consoleFilter.addEventListener('input', e => {
        filterText = e.target.value;
        applyFilter();
      });

      function renderSubagents(subagents) {

          subagentCount.textContent = '0';
          return;

        const runningCount = subagents.filter(a => a.status === 'running').length;
        subagentCount.textContent = runningCount > 0 ? `${runningCount}/${subagents.length} active` : subagents.length;

        const getAgentIcon = (agent) => {
          if (agent.status === 'running') return '⚡';
          const id = (agent.id || '').toLowerCase();

          if (id.includes('researcher')) return '🔍';
          if (id.includes('writer')) return '✍️';
          if (id.includes('analyzer')) return '📊';

        subagentsView.innerHTML = subagents.map(agent => {
          const isRunning = agent.status === 'running';
          const agentId = (agent.id || '').toLowerCase();
          const agentTasks = subagentTasks.filter(t => (t.agent || '').toLowerCase() === agentId);
          const completedTasks = agentTasks.filter(t => t.status === 'complete').length;
          const totalQueries = agentTasks.reduce((sum, t) => sum + (t.queries?.length || 0), 0);

          let tasksSummary = '';
          if (agentTasks.length > 0) {
            tasksSummary = `<span class="agent-tasks-badge">${completedTasks}/${agentTasks.length} tasks • ${totalQueries} queries</span>`;
          }

          let nestedContent = '';
          if (agentTasks.length > 0) {
            nestedContent = `
              <div class="agent-nested-tasks">
                ${agentTasks.map(task => {
                  const taskComplete = task.status === 'complete';
                  const taskRunning = task.status === 'running';
                  const taskIcon = taskComplete ? '✅' : taskRunning ? '⏳' : '○';
                  const queries = task.queries || [];
                  const completedQueries = queries.filter(q => q.status === 'complete').length;

                  return `
                    <details class="task-details ${task.status}" ${taskRunning ? 'open' : ''}>
                      <summary class="task-summary">
                        <span class="task-icon">${taskIcon}</span>
                        <span class="task-title">Task ${task.id}</span>
                        <span class="task-meta">${task.sections?.length ? `${task.sections.length} sections` : `${completedQueries}/${queries.length} queries`}</span>
                      </summary>
                      <div class="task-body">
                        <div class="task-focus">${task.focus || 'Research task'}</div>
                        ${task.sections?.length > 0 ? `
                          <div class="section-list" style="margin: 8px 0; padding: 8px; background: var(--bg-secondary); border-radius: 4px; border-left: 2px solid var(--accent);">
                            <div style="font-size: 10px; color: var(--text-muted); margin-bottom: 6px;">📋 Research Outline:</div>
                            ${task.sections.map((s, i) => `
                              <div style="font-size: 11px; color: var(--text-secondary); padding: 2px 0;">${i + 1}. ${s}</div>
                            `).join('')}
                          </div>
                        ` : ''}
                        ${queries.length > 0 ? `
                          <div class="query-list">
                            ${queries.map(q => `
                              <div class="query-item ${q.status}">
                                <span class="query-check">${q.status === 'complete' ? '✓' : q.status === 'running' ? '⏳' : '○'}</span>
                                <span class="query-text">${q.query}</span>
                              </div>
                            `).join('')}
                          </div>
                        ` : ''}
                        ${task.started_at ? `<div class="task-time">Started: ${task.started_at}${task.completed_at ? ` • Done: ${task.completed_at}` : ''}</div>` : ''}
                      </div>
                    </details>
                  `;
                }).join('')}
              </div>
            `;
          }

          const agentTodos = agent.todos || [];
          let todosContent = '';
          if (agentTodos.length > 0) {
            const completedTodos = agentTodos.filter(t => t.status === 'completed').length;
            todosContent = `
              <details class="agent-todos-section" ${isRunning ? 'open' : ''}>
                <summary style="font-size: 10px; color: var(--text-muted); cursor: pointer; padding: 4px 0;">
                  📝 Agent Checklist (${completedTodos}/${agentTodos.length})
                </summary>
                <div style="margin-top: 6px; padding-left: 8px; border-left: 2px solid var(--border-subtle);">
                  ${agentTodos.map(t => `
                    <div style="display: flex; align-items: flex-start; gap: 6px; padding: 2px 0; font-size: 10px;">
                      <span style="color: ${t.status === 'completed' ? 'var(--success)' : t.status === 'in_progress' ? 'var(--accent)' : 'var(--text-muted)'};">
                        ${t.status === 'completed' ? '✓' : t.status === 'in_progress' ? '◐' : '○'}
                      </span>
                      <span style="color: ${t.status === 'completed' ? 'var(--text-muted)' : 'var(--text-secondary)'}; ${t.status === 'completed' ? 'text-decoration: line-through;' : ''}">${t.content}</span>
                    </div>
                  `).join('')}
                </div>
              </details>
            `;
          }

          const hasContent = todosContent || nestedContent;

          return `
            <details class="agent-card ${isRunning ? 'running' : ''}" ${isRunning ? 'open' : ''}>
              <summary class="agent-header">
                <div class="subagent-icon ${isRunning ? 'running' : ''}">${getAgentIcon(agent)}</div>
                <div class="subagent-info">
                  <div class="subagent-name">${agent.name || agent.id} ${tasksSummary}</div>
                  <div class="subagent-task">${agent.current_task || (isRunning ? 'Working...' : 'Standing by')}</div>
                </div>
                <span class="subagent-status ${agent.status}">${agent.status}</span>
              </summary>
              ${hasContent ? `<div class="agent-body">${todosContent}${nestedContent}</div>` : ''}
            </details>
          `;
        }).join('');
      }

          sourcesView.innerHTML = '<div style="color: var(--text-muted); font-size: 11px;">No sources yet</div>';
          sourceCount.textContent = '0';

          html += `<div style="margin-bottom: 12px;">
            <div style="font-size: 10px; color: var(--success); margin-bottom: 6px; font-weight: 600;">

      function getToolIcon(name) {
        const n = (name || '').toLowerCase();
        if (n.includes('search') || n.includes('tavily') || n.includes('google')) return { icon: '🔍', cls: 'search' };
        if (n.includes('code') || n.includes('python') || n.includes('execute')) return { icon: '💻', cls: 'code' };
        if (n.includes('file') || n.includes('read') || n.includes('write')) return { icon: '📄', cls: 'file' };
        if (n.includes('todo') || n.includes('task')) return { icon: '✅', cls: 'default' };
        return { icon: '⚡', cls: 'default' };
      }

      function getToolPreview(args) {
        if (!args) return '';
        if (args.query) return args.query;
        if (args.search_query) return args.search_query;
        if (args.code) return args.code.substring(0, 50) + '...';
        if (args.content) return args.content.substring(0, 50) + '...';
        const firstValue = Object.values(args)[0];
        if (typeof firstValue === 'string') return firstValue.substring(0, 50);
        return '';
