                  <div class="tool-call-preview">${preview || 'No preview'}</div>
                </div>
                <div class="tool-call-time">${time}</div>
                <div class="tool-call-expand">▼</div>
              </div>
              <div class="tool-call-details">
                <div class="tool-call-section">
                  <div class="tool-call-section-label">Arguments</div>
                  <pre>${JSON.stringify(call.arguments || {}, null, 2).substring(0, 2000)}${JSON.stringify(call.arguments || {}, null, 2).length > 2000 ? '\n... (truncated)' : ''}</pre>
                </div>
                ${call.result ? `
                <div class="tool-call-section">
                  <div class="tool-call-section-label">Result</div>
                  <pre>${(typeof call.result === 'string' ? call.result : JSON.stringify(call.result, null, 2)).substring(0, 1000)}${(typeof call.result === 'string' ? call.result : JSON.stringify(call.result, null, 2)).length > 1000 ? '\n... (truncated)' : ''}</pre>
                </div>
                ` : ''}
              </div>
            </div>
          `;
        }).join('');
      }

      function extractToolCalls(snapshot) {
        const calls = [];

        if (snapshot.latest_tool_calls && Array.isArray(snapshot.latest_tool_calls)) {
          snapshot.latest_tool_calls.forEach(call => {
            if (call.id && !cachedState.seenToolCallIds.has(call.id)) {
              cachedState.seenToolCallIds.add(call.id);
              calls.push({
                ...call,
                timestamp: new Date().toISOString(),
              });
            } else if (!call.id) {
              const syntheticId = `${call.name}-${JSON.stringify(call.arguments)}`;
              if (!cachedState.seenToolCallIds.has(syntheticId)) {
                cachedState.seenToolCallIds.add(syntheticId);
                calls.push({
                  ...call,
                  id: syntheticId,
                  timestamp: new Date().toISOString(),
                });
              }
            }
          });
        }

        if (snapshot.messages && Array.isArray(snapshot.messages)) {
          snapshot.messages.forEach(msg => {
            if (msg.tool_calls && Array.isArray(msg.tool_calls)) {
              msg.tool_calls.forEach(call => {
                if (call.id && !cachedState.seenToolCallIds.has(call.id)) {
                  cachedState.seenToolCallIds.add(call.id);
                  calls.push({
                    ...call,
                    timestamp: new Date().toISOString(),
                  });
                }
              });
            }
          });
        }

        return calls;
      }

      let reportButtonShown = false;

      function mergeById(existing, updates, idKey = 'id', altKey = null) {
        const map = new Map();
        const getKey = (item) => item[idKey] || (altKey && item[altKey]) || JSON.stringify(item);
        (existing || []).forEach(item => map.set(getKey(item), item));
        (updates || []).forEach(item => {
          const key = getKey(item);
          const prev = map.get(key) || {};
          map.set(key, { ...prev, ...item });
        });
        return Array.from(map.values());
      }

      function mergeResearcherTasks(existing, updates) {
        const taskMap = new Map();
        (existing || []).forEach(task => taskMap.set(task.id, { ...task }));
        (updates || []).forEach(task => {
          const existingTask = taskMap.get(task.id);
          if (existingTask) {
            const queryMap = new Map();
            (existingTask.queries || []).forEach(q => {
              const qkey = q.query || q.id;
              if (qkey) queryMap.set(qkey, q);
            });
            (task.queries || []).forEach(q => {
              const qkey = q.query || q.id;
              if (qkey) {
                const prev = queryMap.get(qkey) || {};
                queryMap.set(qkey, { ...prev, ...q });
              }
            });
            taskMap.set(task.id, {
              ...existingTask,
              ...task,
              queries: Array.from(queryMap.values())
            });
          } else {
            taskMap.set(task.id, { ...task });
          }
        });
        return Array.from(taskMap.values()).sort((a, b) => a.id - b.id);
      }

      function mergeFiles(existing, updates) {
        return { ...(existing || {}), ...(updates || {}) };
      }

      function mergeSources(existing, updates) {
        const set = new Set([...(existing || []), ...(updates || [])]);
        return Array.from(set);
      }

      function renderState(snapshot) {
        if (!snapshot) return;

        if (snapshot.subagents && Array.isArray(snapshot.subagents) && snapshot.subagents.length > 0) {
          cachedState.subagents = mergeById(cachedState.subagents, snapshot.subagents, 'id');
        }

        if (snapshot.todos && Array.isArray(snapshot.todos) && snapshot.todos.length > 0) {
          cachedState.todos = mergeById(cachedState.todos, snapshot.todos, 'id');
        }
        renderTodos(cachedState.todos);

        if (snapshot.files && typeof snapshot.files === 'object' && Object.keys(snapshot.files).length > 0) {
          cachedState.files = mergeFiles(cachedState.files, snapshot.files);
        }
        renderFiles(cachedState.files);

        const newToolCalls = extractToolCalls(snapshot);
        if (newToolCalls.length > 0) {
          cachedState.toolCalls = [...cachedState.toolCalls, ...newToolCalls];
        }
        renderToolCalls(cachedState.toolCalls);

        if (snapshot.latest_reasoning) cachedState.reasoning = snapshot.latest_reasoning;
        reasoningView.textContent = cachedState.reasoning || 'No reasoning yet';

        if (snapshot.sources && Array.isArray(snapshot.sources) && snapshot.sources.length > 0) {
          cachedState.sources = mergeSources(cachedState.sources, snapshot.sources);
        }
        if (snapshot.discovered_sources && Array.isArray(snapshot.discovered_sources) && snapshot.discovered_sources.length > 0) {
          cachedState.discoveredSources = mergeById(cachedState.discoveredSources, snapshot.discovered_sources, 'url');
        }
        renderSources(cachedState.sources, cachedState.discoveredSources);

        const queryPlans = snapshot.query_plans || snapshot.queryPlans || snapshot.queries || snapshot.search_queries || [];
        if (queryPlans.length > 0) {
          cachedState.queryPlans = mergeById(cachedState.queryPlans, queryPlans, 'id', 'query');
        }

        const subagentTasks = snapshot.subagent_tasks || snapshot.subagentTasks || snapshot.researcher_tasks || [];
        if (subagentTasks.length > 0) {
          cachedState.subagentTasks = mergeResearcherTasks(cachedState.subagentTasks, subagentTasks);
        }

        renderSubagents(cachedState.subagents);

        const knownKeys = new Set([
          'version', 'messages', 'todos', 'files', 'subagents', 'sources',
          'discovered_sources', 'latest_reasoning', 'latest_tool_calls',
          'query_plans', 'queryPlans', 'queries', 'search_queries',
          'subagent_tasks', 'subagentTasks', 'researcher_tasks', 'researcherTasks'
        ]);
        const extra = {};
        for (const [key, value] of Object.entries(snapshot)) {
          if (!knownKeys.has(key) && value !== null && value !== undefined) {
            extra[key] = value;
          }
        }
        if (Object.keys(extra).length > 0) {
          cachedState.extraState = { ...cachedState.extraState, ...extra };
        }
        renderExtraState(cachedState.extraState);

        renderReport(cachedState.report);

        console.log('State updated:', {
          subagents: cachedState.subagents.length,
          todos: cachedState.todos.length,
          files: Object.keys(cachedState.files).length,
          sources: cachedState.sources.length,
          queryPlans: cachedState.queryPlans.length,
          toolCalls: cachedState.toolCalls.length,
          extra: Object.keys(cachedState.extraState),
        });
      }

      let currentActiveAgent = null;
      let subagentTaskCounter = 0;
      let currentActiveAgentInstanceId = null;
      const agentInstanceIdToAgent = new Map();

      function findTaskByContext(metadata) {
        if (!metadata) return null;
        if (metadata.agent_id && agentInstanceIdToAgent.has(metadata.agent_id)) {
          const tasks = cachedState.subagentTasks.filter(t => t.agent_instance_id === metadata.agent_id);
          if (tasks.length > 0) return tasks[tasks.length - 1];
        }
        const agentName = metadata.workflow?.toLowerCase();
        if (agentName) {
          const tasks = cachedState.subagentTasks.filter(t => t.agent === agentName);
          if (tasks.length > 0) return tasks[tasks.length - 1];
        }
        return null;
      }

      function updateSubagentFromEvent(payload) {
        const agentName = payload?.name || payload?.agent;
        if (!agentName) return;
        const agentId = agentName.toLowerCase();
        const agentInstanceId = payload.metadata?.agent_id;

        currentActiveAgent = agentId;
        if (agentInstanceId) {
          currentActiveAgentInstanceId = agentInstanceId;
        }

        const existing = cachedState.subagents.find(a => a.id === agentId);
        if (existing) {
          existing.status = 'running';
          existing.current_task = payload.data?.input ? `Input: ${payload.data.input.substring(0, 50)}...` : 'Working...';
          existing.startedAt = existing.startedAt || new Date().toLocaleTimeString();
          if (agentInstanceId) {
            existing.agent_instance_id = agentInstanceId;
            agentInstanceIdToAgent.set(agentInstanceId, existing);
          }
        } else {
          const newAgent = {
            id: agentId,
            name: agentName,
            status: 'running',
            current_task: payload.data?.input ? `Input: ${payload.data.input.substring(0, 50)}...` : 'Working...',
            startedAt: new Date().toLocaleTimeString(),
            agent_instance_id: agentInstanceId,
          };
          cachedState.subagents.push(newAgent);
          if (agentInstanceId) {
            agentInstanceIdToAgent.set(agentInstanceId, newAgent);
          }
        }

        if (agentInstanceId) {
          const existingTask = cachedState.subagentTasks.find(t => t.agent_instance_id === agentInstanceId);
          if (!existingTask) {
            subagentTaskCounter++;
            const inputText = payload.data?.input;
            cachedState.subagentTasks.push({
              id: subagentTaskCounter,
              agent_instance_id: agentInstanceId,
              agent: agentId,
              focus: typeof inputText === 'string' ? inputText.substring(0, 100) : 'Research task',
              status: 'running',
              queries: [],
              started_at: new Date().toLocaleTimeString(),
            });
            console.log('[Debug] Created task from workflow.start:', agentId, 'agent_id:', agentInstanceId);
          }
        }

        renderSubagents(cachedState.subagents);
      }

      function markSubagentComplete(payload) {
        const agentName = payload?.name || payload?.agent;
        if (!agentName) return;
        const agentId = agentName.toLowerCase();
        const agentInstanceId = payload.metadata?.agent_id;

        let existing = null;
        if (agentInstanceId) {
          existing = agentInstanceIdToAgent.get(agentInstanceId);
        }
        if (!existing) {
          existing = cachedState.subagents.find(a => a.id === agentId);
        }

        if (existing) {
          existing.status = 'complete';
          existing.current_task = 'Done';
          existing.completedAt = new Date().toLocaleTimeString();
        }

        const tasksToComplete = agentInstanceId
          ? cachedState.subagentTasks.filter(t => t.agent_instance_id === agentInstanceId && t.status === 'running')
          : cachedState.subagentTasks.filter(t => t.agent === agentId && t.status === 'running');

        tasksToComplete.forEach(t => {
          t.status = 'complete';
          t.completed_at = new Date().toLocaleTimeString();
        });

        if (currentActiveAgent === agentId) {
          currentActiveAgent = null;
        }
        if (currentActiveAgentInstanceId === agentInstanceId) {
          currentActiveAgentInstanceId = null;
        }

        renderSubagents(cachedState.subagents);
      }

      function updateFromToolCall(payload) {
        const tool = payload?.name || payload?.tool;
        if (!tool) return;
        const toolInput = payload.data?.input || payload;

        cachedState.toolCalls.push({
          name: tool,
          arguments: toolInput,
          timestamp: payload.timestamp || new Date().toISOString(),
        });
        if (cachedState.toolCalls.length > MAX_TOOL_CALLS) {
          cachedState.toolCalls = cachedState.toolCalls.slice(-MAX_TOOL_CALLS);
        }
        renderToolCalls(cachedState.toolCalls);

        // Handle search queries - associate with agent via agent_id
        const query = payload.query || toolInput?.query || toolInput?.question || payload.question;
        if (query && typeof query === 'string') {
          const queryText = query.substring(0, 100);
          const metadata = payload.metadata || {};
          console.log('[Debug] Search query:', tool, 'agent_id:', metadata.agent_id);

          let activeTask = findTaskByContext(metadata);

          // Final fallback: use current active context (backward compatible)
          if (!activeTask && currentActiveAgent) {
            activeTask = cachedState.subagentTasks
              .filter(t => t.agent === currentActiveAgent)
              .pop();
            console.log('[Debug] Fallback to currentActiveAgent:', currentActiveAgent, 'task:', activeTask?.id);
          }

          if (activeTask) {
            const existingQuery = activeTask.queries.find(q => q.query === queryText);
            if (!existingQuery) {
              activeTask.queries.push({
                id: `q-${Date.now()}`,
                query: queryText,
                tool: tool,
                status: 'running',
                timestamp: payload.timestamp || new Date().toLocaleTimeString(),
                agent_id: metadata.agent_id,
              });
              console.log('[Debug] Added query to task', activeTask.id, 'total queries:', activeTask.queries.length);
            }
          }

          renderSubagents(cachedState.subagents);
        }

        // Handle write_file
        const filePath = payload.file_path || toolInput?.file_path || toolInput?.path;
        if (tool === 'write_file' && filePath) {
          cachedState.files[filePath] = {
            path: filePath,
            content: toolInput?.content || '',
          };
          renderFiles(cachedState.files);
        } else if (tool === 'write_file' && !filePath) {
          const fileInfo = extractFileFromInput(typeof toolInput === 'string' ? toolInput : JSON.stringify(toolInput));
          if (fileInfo) {
            cachedState.files[fileInfo.path] = fileInfo;
            renderFiles(cachedState.files);
          }
        }
      }

      function parseToolInput(input) {
        try {
          const normalized = input.replace(/'/g, '"');
          return JSON.parse(normalized);
        } catch (e) {
          return { raw: input };
        }
      }

      function extractFileFromInput(input) {
        const pathMatch = input.match(/'file_path':\s*'([^']+)'/);
        const contentMatch = input.match(/'content':\s*'([^']+)'/);
        if (pathMatch) {
          return {
            path: pathMatch[1],
            content: contentMatch ? contentMatch[1] : '',
          };
        }
        return null;
      }

      // NAT-aligned event handlers
      function updateToolEndFromEvent(payload) {
        const tool = payload?.name || payload?.tool;
        if (!tool) return;

        const lastCall = cachedState.toolCalls.find(c => c.name === tool && !c.result);
        if (lastCall) {
          lastCall.result = payload.data?.output || '';
        }
        renderToolCalls(cachedState.toolCalls);

        // Handle search results - extract URLs (generic pattern matching)
        const isSearchTool = ['search', 'tavily', 'web_search', 'google', 'bing']
          .some(p => tool.toLowerCase().includes(p));
        if (isSearchTool) {
          const output = payload.data?.output || '';
          const metadata = payload.metadata || {};
          const urlMatches = output.match(/https?:\/\/[^\s<>"')\]}>]+/g) || [];
          urlMatches.slice(0, 10).forEach(url => {
            if (!cachedState.discoveredSources.find(s => s.url === url)) {
              cachedState.discoveredSources.push({
                url: url.replace(/[.,;:!?]+$/, ''),
                discovered_at: new Date().toLocaleTimeString(),
                ...metadata,
              });
            }
          });
          renderSources(cachedState.sources, cachedState.discoveredSources);

          // Update query status using generic context matching
          let targetTask = findTaskByContext(metadata);
          if (!targetTask && currentActiveAgent) {
            targetTask = cachedState.subagentTasks
              .filter(t => t.agent === currentActiveAgent)
              .pop();
          }

          if (targetTask) {
            targetTask.queries.forEach(q => {
              if (q.status === 'running') q.status = 'complete';
            });
            renderSubagents(cachedState.subagents);
          }
        }
      }

      function updateLLMStartFromEvent(payload) {
        // NAT-aligned: use metadata.workflow for agent reference
        const agent = payload.metadata?.workflow?.toLowerCase() || payload.agent?.toLowerCase();
        const model = payload.name || payload.model || 'LLM';
        if (agent) {
          const subagent = cachedState.subagents.find(a => a.id === agent);
          if (subagent) {
            subagent.current_task = `Thinking... (${model})`;
            renderSubagents(cachedState.subagents);
          }
        }
      }

      // NAT-aligned: handle streaming chunks
      function updateLLMChunkFromEvent(payload) {
        const chunk = payload.data?.chunk || '';
        if (!chunk) return;

        // Append to reasoning view for real-time streaming
        if (!cachedState._streamingContent) {
          cachedState._streamingContent = '';
          reasoningView.innerHTML = `
            <div style="margin-bottom: 8px; font-size: 10px; color: var(--accent);">
              💬 Streaming...
            </div>
            <div id="streamingContent" style="white-space: pre-wrap; line-height: 1.5;"></div>
          `;
        }
        cachedState._streamingContent += chunk;
        const streamEl = document.getElementById('streamingContent');
        if (streamEl) {
          streamEl.textContent = cachedState._streamingContent;
        }
      }

      // NAT-aligned: handle llm.end with thinking in metadata
      function updateLLMEndFromEvent(payload) {
        const content = payload.data?.output || '';
        const thinking = payload.metadata?.thinking || '';
        const agent = payload.metadata?.workflow || payload.name || 'unknown';

        // Clear streaming state
        cachedState._streamingContent = '';

        if (thinking || content) {
          cachedState.reasoning = (thinking ? `💭 Thinking:\n${thinking}\n\n` : '') +
                                   (content ? `💬 Output:\n${content}` : '');
          reasoningView.innerHTML = `
            ${thinking ? `
              <div style="margin-bottom: 12px;">
                <div style="margin-bottom: 6px; font-size: 10px; color: var(--purple);">
                  💭 LLM Thinking <span style="color: var(--text-muted);">(${agent})</span>
                </div>
                <div style="white-space: pre-wrap; line-height: 1.5; color: var(--text-secondary); padding: 8px; background: var(--bg-tertiary); border-radius: 4px; border-left: 2px solid var(--purple);">${thinking}</div>
              </div>
            ` : ''}
            ${content ? `
              <div>
                <div style="margin-bottom: 6px; font-size: 10px; color: var(--accent);">
                  💬 LLM Output <span style="color: var(--text-muted);">(${agent})</span>
                </div>
                <div style="white-space: pre-wrap; line-height: 1.5;">${content}</div>
              </div>
            ` : ''}
          `;
        }
      }

      function handleArtifactUpdate(payload) {
        const artifactType = payload.data?.type;
        const content = payload.data?.content;
        if (!artifactType || content === undefined) return;

        const workflow = payload.metadata?.workflow || payload.name || 'unknown';

        switch (artifactType) {
          case 'file':
            const path = payload.data?.path || payload.name;
            if (path && content) {
              cachedState.files[path] = content;
              renderFiles(cachedState.files);
            }
            break;

          case 'output':
            cachedState.report = content;
            renderReport(content);
            break;

          case 'citation_source':
            const sourceUrl = payload.data?.url || content;
            if (sourceUrl && !cachedState.discoveredSources.some(s => s.url === sourceUrl)) {
              cachedState.discoveredSources.push({
                url: sourceUrl,
                title: payload.data?.title,
                snippet: payload.data?.snippet,
                discovered_at: new Date().toLocaleTimeString(),
                agent: workflow,
                cited: false,
              });
              renderSources(cachedState.sources, cachedState.discoveredSources);
            }
            break;

          case 'citation_use':
            const citedUrl = payload.data?.url || content;
            if (citedUrl) {
              if (!cachedState.sources.includes(citedUrl)) {
                cachedState.sources.push(citedUrl);
              }
              const discovered = cachedState.discoveredSources.find(s => s.url === citedUrl);
              if (discovered) {
                discovered.cited = true;
              }
              renderSources(cachedState.sources, cachedState.discoveredSources);
            }
            break;

          case 'todo':
            // Handle both array format (from write_todos tool) and individual item format
            if (Array.isArray(content)) {
              // New format: content is the entire todos array from write_todos
              const todos = content.map(t => ({
                id: t.content || t.id || String(Math.random()),
                content: t.content || t.text || String(t),
                status: t.status || 'pending',
              }));

              // Determine if these todos belong to a subagent or orchestrator
              const isSubagent = workflow &&
                !workflow.includes('orchestrator') &&
                !workflow.includes('deep-research');

              // Check for orchestrator-specific patterns
              const hasOrchestratorPatterns = todos.some(t =>
                t.content && (
                  t.content.includes('planner-agent') ||
                  t.content.includes('researcher-agent') ||
                  t.content.includes('Task decomposition') ||
                  t.content.includes('Synthesize findings') ||
                  t.content.includes('Write final report') ||
                  t.content.includes('Save user request')
                )
              );

              if (isSubagent && !hasOrchestratorPatterns) {
                // Assign to subagent
                const subagent = cachedState.subagents.find(a => a.id === workflow);
                if (subagent) {
                  subagent.todos = todos;
                  renderSubagents(cachedState.subagents);
                }
              } else {
                // Assign to main orchestrator todo list
                cachedState.todos = todos;
                renderTodos(cachedState.todos);
              }
            } else {
              // Legacy format: individual todo item
              const todoId = payload.data?.id || content;
              const todoStatus = payload.data?.status || 'pending';
              if (todoId) {
                const existingTodo = cachedState.todos.find(t => t.id === todoId);
                if (existingTodo) {
                  existingTodo.content = content;
                  existingTodo.status = todoStatus;
                } else {
                  cachedState.todos.push({ id: todoId, content, status: todoStatus });
                }
                renderTodos(cachedState.todos);
              }
            }
            break;
        }

        appendConsole('sse', {
          event: 'artifact.update',
          type: artifactType,
          workflow,
        });
      }

      function showJobBanner(jobId, status = 'running') {
        activeJobId = jobId;

        const statusConfig = {
          running: {
            icon: '🚀',
            title: 'Deep Research Job',
            subtitle: '✅ Checkpointed • 🔄 Resumable • ⏸️ HITL: planner-agent',
            showActions: true,
            borderColor: 'var(--accent)',
          },
          complete: {
            icon: '✅',
            title: 'Research Complete',
            subtitle: 'Report is ready to view',
            showActions: false,
            borderColor: 'var(--success)',
          },
          failed: {
            icon: '❌',
            title: 'Job Failed',
            subtitle: 'Check console for error details',
            showActions: false,
            borderColor: 'var(--error)',
          },
          cancelled: {
            icon: '🚫',
            title: 'Job Cancelled',
            subtitle: 'This job was cancelled and cannot be resumed',
            showActions: false,
            borderColor: 'var(--text-muted)',
          },
          paused: {
            icon: '⏸️',
            title: 'Job Paused (HITL)',
            subtitle: 'Waiting for human review',
            showActions: true,
            borderColor: 'var(--warning)',
          },
        };

        const config = statusConfig[status] || statusConfig.running;

        const actionsHtml = config.showActions ? `
          <div class="job-banner-actions">
            <button class="btn btn-primary" onclick="startStream('${jobId}')">Stream</button>
            <button class="btn" onclick="fetchState('${jobId}')">State</button>
            <button class="btn" onclick="fetchReport('${jobId}')">Report</button>
            <button class="btn btn-danger" onclick="cancelJob('${jobId}')">Cancel</button>
          </div>
        ` : '';

        jobBannerContainer.innerHTML = `
          <div class="job-banner" style="border-color: ${config.borderColor};">
            <div class="job-banner-title">${config.icon} ${config.title}</div>
            <div class="job-banner-id">Job ID: ${jobId}</div>
            <div style="font-size: 10px; color: var(--text-secondary); margin-bottom: 8px;">
              ${config.subtitle}
            </div>
            ${actionsHtml}
          </div>
        `;
        renderSubagents(cachedState.subagents);
      }

      function hideJobBanner() {
        jobBannerContainer.innerHTML = '';
        activeJobId = '';
      }

      async function fetchState(jobId) {
        try {
          const stateUrl = `${baseUrl()}${apiPath(`/${jobId}/state`)}`;
          const res = await fetch(stateUrl, { credentials: 'include' });
          if (res.ok) {
            const data = await res.json();
            if (data.has_state && data.state) {
              renderState(data.state);
              appendConsole('http', { action: 'loaded_state', job_id: jobId });
            }
          }
        } catch (err) {
          appendConsole('error', { error: err.message });
        }
      }

      async function fetchJobStatus(jobId) {
        try {
          const statusUrl = `${baseUrl()}${apiPath(`/${jobId}`)}`;
          const res = await fetch(statusUrl, { credentials: 'include' });
          if (res.ok) {
            const status = await res.json();
            appendConsole('http', { action: 'job_status', ...status });
            return status;
          }
        } catch (e) {
          appendConsole('error', { error: `Failed to fetch job status: ${e.message}` });
        }
        return null;
      }

      async function fetchLatestState(jobId) {
        await fetchJobStatus(jobId);
        await fetchState(jobId);
      }

      async function fetchReport(jobId) {
        try {
          const reportUrl = `${baseUrl()}${apiPath(`/${jobId}/report`)}`;
          const res = await fetch(reportUrl, { credentials: 'include' });
          if (res.ok) {
            const data = await res.json();
            if (data.has_report && data.report) {
              cachedState.report = data.report;
              renderReport(data.report);
              appendConsole('http', { action: 'loaded_report', length: data.report.length });
              return data.report;
            }
          } else if (res.status !== 404) {
            appendConsole('error', { error: `Failed to fetch report: ${res.status}` });
          }
        } catch (e) {
          appendConsole('error', { error: `Failed to fetch report: ${e.message}` });
        }
        return null;
      }

      function startStream(jobId, isReconnect = false) {
        if (reconnectTimer) {
          clearTimeout(reconnectTimer);
          reconnectTimer = null;
        }

        if (eventSource) {
          eventSource.close();
          eventSource = null;
        }

        activeJobId = jobId;

        // Use cleaner stream URL path instead of query params
        const streamPath = lastEventId
          ? `${apiPath(`/${jobId}/stream/${lastEventId}`)}`
          : `${apiPath(`/${jobId}/stream`)}`;
        const url = new URL(`${baseUrl()}${streamPath}`);

        try {
          eventSource = new EventSource(url.toString(), { withCredentials: true });
        } catch (e) {
          appendConsole('error', { error: `Failed to create EventSource: ${e.message}` });
          scheduleReconnect(jobId);
          return;
        }

        setStatus(isReconnect ? 'Reconnecting...' : 'Streaming', true, true);

        if (!isReconnect) {
          const startEvent = { event: 'stream.start', job_id: jobId, timestamp: new Date().toISOString() };
          addSSEEvent(startEvent);
          appendConsole('sse', startEvent);
        }

        let jobCompleted = false;

        const handleEvent = evt => {
          reconnectAttempts = 0;

          if (evt.lastEventId) lastEventId = evt.lastEventId;
          let payload = evt.data;
          try { payload = JSON.parse(evt.data); } catch (e) {}

          const eventEntry = { event: evt.type, id: evt.lastEventId, data: payload, timestamp: new Date().toISOString() };
          addSSEEvent(eventEntry);
          appendConsole('sse', eventEntry);

          if (evt.type === 'job.status' && payload?.status === 'success') {
            jobCompleted = true;
            setStatus('Complete', true, false);
            closeStream();
            updateReportStatus(jobId, 'complete');
            setInputEnabled(true);
            showJobBanner(jobId, 'complete');
            fetchReport(jobId).then(report => {
              if (report) {
                cachedState.report = report;
                renderReport(report);
                if (!reportButtonShown) {
                  reportButtonShown = true;
                  appendChat('assistant', '', { viewReport: true, jobId: jobId });
                  setLoading(false);
                }
              }
            });
            fetchState(jobId);
          } else if (evt.type === 'job.status' && payload?.status === 'failure') {
            jobCompleted = true;
            setStatus('Failed', true, false);
            setLoading(false);
            closeStream();
            updateReportStatus(jobId, 'failed');
            setInputEnabled(true);
            showJobBanner(jobId, 'failed');
            const errorMsg = payload?.error || 'Unknown error';
            appendChat('assistant', `❌ **Job Failed**\n\n\`\`\`\n${errorMsg}\n\`\`\`\n\nPlease check the server logs for more details.`);
          } else if (evt.type === 'job.status' && payload?.status === 'interrupted') {
            jobCompleted = true;
            setStatus('Paused', true, false);
            setLoading(false);
            closeStream();
            updateReportStatus(jobId, 'paused');
            setInputEnabled(true);
            showJobBanner(jobId, 'paused');
          } else if (evt.type === 'job.paused') {
            jobCompleted = true;
            setStatus('Paused', true, false);
            setLoading(false);
            closeStream();
            updateReportStatus(jobId, 'paused');
            setInputEnabled(true);
            showJobBanner(jobId, 'paused');
          } else if (evt.type === 'job.status' && payload?.status === 'cancelled') {
            jobCompleted = true;
            setStatus('Cancelled', true, false);
            setLoading(false);
            closeStream();
            updateReportStatus(jobId, 'cancelled');
            setInputEnabled(true);
            showJobBanner(jobId, 'cancelled');
          } else if (evt.type === 'job.shutdown') {
            jobCompleted = true;
            setStatus('Server shutting down', true, false);
            setLoading(false);
            closeStream();
            resetStreamIndicators();
            setInputEnabled(true);
            appendChat('assistant', '⚠️ **Server Shutting Down**\n\nThe server is shutting down. Your job progress has been saved. Please reconnect when the server is back online.');
          } else if (evt.type === 'job.error') {
            jobCompleted = true;
            setStatus('Error', true, false);
            setLoading(false);
            closeStream();
            updateReportStatus(jobId, 'failed');
            setInputEnabled(true);
            showJobBanner(jobId, 'failed');
            const errorMsg = payload?.error || 'Unknown error';
            const errorType = payload?.error_type || 'Error';
            appendChat('assistant', `❌ **Job Error: ${errorType}**\n\n\`\`\`\n${errorMsg}\n\`\`\`\n\nPlease check the server logs for more details.`);
          } else if (evt.type === 'stream.mode') {
            const mode = payload?.mode;
            const intervalMs = payload?.interval_ms;
            setStreamMode(mode, intervalMs);
          }

          if (lastEventTimestamp && payload?.timestamp) {
            const serverTime = new Date(payload.timestamp).getTime();
            const clientTime = Date.now();
            const latency = clientTime - serverTime;
            if (latency > 0 && latency < 10000) {
              updateLatency(latency);
            }
          }
          lastEventTimestamp = Date.now();

          // NAT-aligned event handling: {category}.{state} - all present tense verbs
          try {
            if (evt.type === 'workflow.start') {
              updateSubagentFromEvent(payload);
            }

            if (evt.type === 'workflow.end') {
              markSubagentComplete(payload);
            }

            if (evt.type === 'tool.start') {
              updateFromToolCall(payload);
            }

            if (evt.type === 'tool.end') {
              updateToolEndFromEvent(payload);
            }

            if (evt.type === 'llm.start') {
              updateLLMStartFromEvent(payload);
            }

            if (evt.type === 'llm.chunk') {
              updateLLMChunkFromEvent(payload);
            }

            if (evt.type === 'llm.end') {
              updateLLMEndFromEvent(payload);
            }

            // Artifact tracking (files, output, citations, todos)
            if (evt.type === 'artifact.update') {
              handleArtifactUpdate(payload);
            }
          } catch (err) {
            console.error(`[SSE Handler Error] ${evt.type}:`, err, payload);
            appendConsole('error', { event: evt.type, error: err.message });
          }
        };

        eventSource.onopen = () => {
          reconnectAttempts = 0;
          setStatus('Streaming', true, true);
          if (isReconnect) {
            appendConsole('sse', { event: 'stream.reconnected', job_id: jobId });
          }
        };

        eventSource.onmessage = handleEvent;
        // NAT-aligned event types: {category}.{state} - all present tense verbs
        [
          'job.status', 'job.error', 'job.paused', 'job.cancelled', 'job.shutdown',
          'workflow.start', 'workflow.end',
          'tool.start', 'tool.end',
          'llm.start', 'llm.chunk', 'llm.end',
          'artifact.update',
          'stream.mode',
          'error'
        ].forEach(name => {
          eventSource.addEventListener(name, handleEvent);
        });

        eventSource.onerror = (err) => {
          if (jobCompleted) {
            closeStream();
            return;
          }

          appendConsole('error', { event: 'stream.error', readyState: eventSource?.readyState });

          if (eventSource?.readyState === EventSource.CLOSED) {
            closeStream();
            scheduleReconnect(jobId);
          } else {
            setStatus('Stream error - reconnecting...', true, false);
          }
        };
      }

      function closeStream() {
        if (eventSource) {
          eventSource.close();
          eventSource = null;
        }
        resetStreamIndicators();
      }

      function scheduleReconnect(jobId) {
        if (reconnectAttempts >= MAX_RECONNECT_ATTEMPTS) {
          setStatus(`Reconnection failed after ${MAX_RECONNECT_ATTEMPTS} attempts`, true, false);
          appendConsole('error', { error: 'Max reconnection attempts reached' });
          return;
        }

        const delay = Math.min(1000 * Math.pow(2, reconnectAttempts), 30000);
        reconnectAttempts++;

        setStatus(`Reconnecting in ${delay/1000}s (attempt ${reconnectAttempts}/${MAX_RECONNECT_ATTEMPTS})...`, true, false);

        reconnectTimer = setTimeout(() => {
          if (activeJobId === jobId) {
            startStream(jobId, true);
          }
        }, delay);
      }

      function addSSEEvent(event) {
        sseEvents.push(event);
        if (sseEvents.length > MAX_SSE_EVENTS) {
          sseEvents = sseEvents.slice(-MAX_SSE_EVENTS);
        }
      }

      function addWSEvent(direction, data) {
        const event = {
          direction,
          data,
          timestamp: new Date().toISOString()
        };
        wsEvents.push(event);
        if (wsEvents.length > MAX_WS_EVENTS) {
          wsEvents = wsEvents.slice(-MAX_WS_EVENTS);
        }
      }

      async function cancelJob(jobId) {
        try {
          const response = await fetch(`${baseUrl()}${apiPath(`/${jobId}/cancel`)}`, {
            method: 'POST',
            credentials: 'include',
          });
          const data = await response.text();
          appendConsole('http', data || { status: response.status });

          if (response.ok) {
            closeStream();
            setStatus('Cancelled', true, false);
            setLoading(false);
            updateReportStatus(jobId, 'cancelled');
            setInputEnabled(true);
            showJobBanner(jobId, 'cancelled');
            appendChat('assistant', '🚫 **Job Cancelled**\n\nThe research job was cancelled and cannot be resumed.');
          }
        } catch (err) {
          appendConsole('error', { error: err.message });
        }
      }

      function parseJobId(text) {
        if (!text) return '';
        try {
          const parsed = JSON.parse(text);
          if (parsed.event === 'deep_research.submitted' && parsed.job_id) return parsed.job_id;
        } catch (e) {}
        const match = text.match(/Job ID:\s*([0-9a-f-]{36})/i) || text.match(/job_id["']?\s*:\s*["']([0-9a-f-]{36})["']/i);
        return match ? match[1] : '';
      }

      function handleInbound(msg) {
        if (msg.type === 'system_response_message') {
          const text = msg.content?.text;
          const jobId = parseJobId(text);
          if (jobId) {
            const lastUserMsg = chatMessages.querySelector('.bubble.user:last-of-type');
            const query = lastUserMsg ? lastUserMsg.textContent : 'Research query';
            addReportToSession(jobId, query);
            setInputEnabled(false);
            showJobBanner(jobId);
            startStream(jobId);
          }

          if (msg.status === 'in_progress') {
            if (text) lastInProgressText = text;
            setLoading(true);
            return;
          }

          if (msg.status === 'complete') {
            const finalText = text || lastInProgressText;
            if (finalText && !parseJobId(finalText) && !activeJobId) {
              appendChat('assistant', finalText);
            }
            lastInProgressText = '';
            if (!activeJobId) setLoading(false);
            return;
          }
        }

        if (msg.type === 'system_intermediate_message') {
          setLoading(true);
        }

        // Handle clarifier and other interaction messages
        if (msg.type === 'system_interaction_message') {
          const interactionText = msg.content?.text;
          if (interactionText) {
            // Store interaction context for reply
            pendingInteraction = {
              thread_id: msg.thread_id,
              parent_id: msg.parent_id,
              input_type: msg.content?.input_type
            };
            savePendingInteraction(pendingInteraction);
            // Display the clarifier question in the chat
            appendChat('assistant', interactionText);
            setLoading(false);
            setInputEnabled(true);
          }
        }

        if (msg.type === 'error' && msg.content?.error) {
          appendChat('assistant', `Error: ${msg.content.error}`);
          setLoading(false);
        }
      }

      function connect() {
        if (socket?.readyState === WebSocket.OPEN) return;
        setIdTokenCookie();
        socket = new WebSocket(wsUrlInput.value);
        setStatus('Connecting...');

        socket.onopen = () => {
          setStatus('Connected', true);
          const connEvent = { event: 'connected' };
          appendConsole('ws-in', connEvent);
          addWSEvent('in', connEvent);
        };

        socket.onclose = () => {
          setStatus('Disconnected');
          const disconnEvent = { event: 'disconnected' };
          appendConsole('ws-in', disconnEvent);
          addWSEvent('in', disconnEvent);
        };

        socket.onerror = err => {
          appendConsole('error', { error: 'WebSocket error' });
        };

        socket.onmessage = evt => {
          appendConsole('ws-in', evt.data);
          try {
            const msg = JSON.parse(evt.data);
            addWSEvent('in', msg);
            handleInbound(msg);
          } catch (e) {
            addWSEvent('in', evt.data);
          }
        };
      }

      function disconnect() {
        if (reconnectTimer) {
          clearTimeout(reconnectTimer);
          reconnectTimer = null;
        }
        if (socket) {
          socket.close();
          socket = null;
        }
        closeStream();
        reconnectAttempts = 0;
        setStatus('Disconnected');
      }

      function resetState() {
        if (reconnectTimer) {
          clearTimeout(reconnectTimer);
          reconnectTimer = null;
        }
        closeStream();

        cachedState.subagents = [];
        cachedState.todos = [];
        cachedState.files = {};
        cachedState.reasoning = '';
        cachedState.sources = [];
        cachedState.discoveredSources = [];
        cachedState.report = '';
        cachedState.queryPlans = [];
        cachedState.subagentTasks = [];
        cachedState.extraState = {};
        cachedState.toolCalls = [];
        cachedState.seenToolCallIds = new Set();
        currentActiveAgent = null;
        subagentTaskCounter = 0;
        currentActiveAgentInstanceId = null;
        agentInstanceIdToAgent.clear();
        reportButtonShown = false;
        activeJobId = '';
        lastEventId = null;
        reconnectAttempts = 0;
        sseEvents = [];
        jobBannerContainer.innerHTML = '';
        renderSubagents([]);
        renderTodos([]);
        renderFiles({});
        renderSources([], []);
        renderExtraState({});
        renderToolCalls([]);
        reasoningView.textContent = 'No reasoning yet';
        reportView.innerHTML = '<div style="color: var(--text-muted);">No report draft yet</div>';
        document.getElementById('reportWordCount').textContent = '0 words';
      }

      function sendMessage() {
        if (!socket || socket.readyState !== WebSocket.OPEN) {
          appendConsole('error', { error: 'Not connected' });
          return;
        }
        if (jobInProgress) {
          appendConsole('error', { error: 'A report is already being generated. Please wait.' });
          return;
        }
        const text = chatInput.value.trim();
        if (!text) return;

        const dataSources = getSelectedDataSources();
        // Empty array = no selection = use all available sources on backend
        const selectedSources = dataSources;
        const wrapJson = Boolean(wrapJsonToggle?.checked);
        const finalText = wrapJson
          ? JSON.stringify({ query: text, data_sources: selectedSources })
          : text;
        let payload;

        // Check if we're responding to an interaction (e.g., clarifier question)
        if (pendingInteraction) {
          payload = {
            type: 'user_interaction_message',
            id: crypto.randomUUID?.() || `msg_${Date.now()}`,
            conversation_id: getConversationId(),
            thread_id: pendingInteraction.thread_id,
            parent_id: pendingInteraction.parent_id,
            content: {
              messages: [{ role: 'user', content: [{ type: 'text', text: finalText }] }],
            },
            timestamp: new Date().toISOString(),
          };
          pendingInteraction = null; // Clear after sending
          clearPendingInteraction();
        } else {
          // Regular message
          resetState();
          if (!loadSession()) {
            createSession();
          }

          payload = {
            type: 'user_message',
            schema_type: 'chat_stream',
            id: crypto.randomUUID?.() || `msg_${Date.now()}`,
            conversation_id: getConversationId(),
            content: {
              messages: [{ role: 'user', content: [{ type: 'text', text: finalText }] }],
            },
            timestamp: new Date().toISOString(),
          };
        }

        socket.send(JSON.stringify(payload));
        appendConsole('ws-out', payload);
        addWSEvent('out', payload);
        appendChat('user', text);
        chatInput.value = '';
        setLoading(true);
      }

      connectBtn.addEventListener('click', connect);
      disconnectBtn.addEventListener('click', disconnect);
      saveTokenBtn.addEventListener('click', setIdTokenCookie);
      clearConsoleBtn.addEventListener('click', () => { consoleEl.innerHTML = ''; sseEvents = []; wsEvents = []; });

      function filterEvents(events, filterText) {
        if (!filterText) return events;
        const lower = filterText.toLowerCase();
        return events.filter(evt => {
          const str = JSON.stringify(evt).toLowerCase();
          return str.includes(lower);
        });
      }

      copySSEBtn.addEventListener('click', () => {
        const filter = consoleFilter.value.trim();
        const filtered = filterEvents(sseEvents, filter);
        const text = JSON.stringify(filtered, null, 2);
        const label = filter ? `Copied ${filtered.length}!` : 'Copied!';
        navigator.clipboard.writeText(text).then(() => {
          copySSEBtn.textContent = label;
          setTimeout(() => { copySSEBtn.textContent = 'Copy SSE'; }, 1500);
        }).catch(err => {
          appendConsole('error', { error: 'Failed to copy: ' + err.message });
        });
      });
      copyWSBtn.addEventListener('click', () => {
        const filter = consoleFilter.value.trim();
        const filtered = filterEvents(wsEvents, filter);
        const text = JSON.stringify(filtered, null, 2);
        const label = filter ? `Copied ${filtered.length}!` : 'Copied!';
        navigator.clipboard.writeText(text).then(() => {
          copyWSBtn.textContent = label;
          setTimeout(() => { copyWSBtn.textContent = 'Copy WS'; }, 1500);
        }).catch(err => {
          appendConsole('error', { error: 'Failed to copy: ' + err.message });
        });
      });
      sendBtn.addEventListener('click', sendMessage);
      chatInput.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });

      loadStoredToken();
      loadDataSources();
      renderSubagents([]);
      renderTodos([]);
      renderFiles({});
      renderSources([]);
      renderExtraState({});
      renderToolCalls([]);

      document.getElementById('clearSessionBtn').addEventListener('click', clearSession);

      restoreSession();
      updateSessionInfoBar();

      setTimeout(() => {
        connect();
      }, 500);

      (function initResizeHandles() {
        const STORAGE_KEY_WIDTHS = 'deep_research_panel_widths';

        function loadSavedWidths() {
          try {
            const saved = sessionStorage.getItem(STORAGE_KEY_WIDTHS);
            if (saved) {
              const widths = JSON.parse(saved);
              const chatPanel = document.querySelector('.panel-chat');
              const consolePanel = document.querySelector('.panel-console');
              if (widths.chat && chatPanel) chatPanel.style.width = widths.chat + 'px';
              if (widths.console && consolePanel) consolePanel.style.width = widths.console + 'px';
            }
          } catch (e) {
            console.error('Failed to load panel widths:', e);
          }
        }

        function saveWidths() {
          try {
            const chatPanel = document.querySelector('.panel-chat');
            const consolePanel = document.querySelector('.panel-console');
            const widths = {
              chat: chatPanel ? chatPanel.offsetWidth : null,
              console: consolePanel ? consolePanel.offsetWidth : null,
            };
            sessionStorage.setItem(STORAGE_KEY_WIDTHS, JSON.stringify(widths));
          } catch (e) {
            console.error('Failed to save panel widths:', e);
          }
        }

        function setupResizeHandle(handle) {
          let isResizing = false;
          let startX = 0;
          let startWidthLeft = 0;
          let startWidthRight = 0;
          let leftPanel = null;
          let rightPanel = null;

          handle.addEventListener('mousedown', (e) => {
            e.preventDefault();
            isResizing = true;
            startX = e.clientX;

            const leftSelector = handle.dataset.left;
            const rightSelector = handle.dataset.right;
            leftPanel = document.querySelector(leftSelector);
            rightPanel = document.querySelector(rightSelector);

            if (leftPanel) startWidthLeft = leftPanel.offsetWidth;
            if (rightPanel) startWidthRight = rightPanel.offsetWidth;

            handle.classList.add('dragging');
            document.body.classList.add('resizing');

            document.addEventListener('mousemove', onMouseMove);
            document.addEventListener('mouseup', onMouseUp);
          });

          function onMouseMove(e) {
            if (!isResizing) return;

            const dx = e.clientX - startX;
            const minWidth = 280;
            const maxWidth = 600;

            if (leftPanel && !leftPanel.classList.contains('panel-state')) {
              const newWidth = Math.max(minWidth, Math.min(maxWidth, startWidthLeft + dx));
              leftPanel.style.width = newWidth + 'px';
            }

            if (rightPanel && !rightPanel.classList.contains('panel-state')) {
              const newWidth = Math.max(minWidth, Math.min(maxWidth, startWidthRight - dx));
              rightPanel.style.width = newWidth + 'px';
            }
          }

          function onMouseUp() {
            isResizing = false;
            handle.classList.remove('dragging');
            document.body.classList.remove('resizing');
            document.removeEventListener('mousemove', onMouseMove);
            document.removeEventListener('mouseup', onMouseUp);
            saveWidths();
          }
        }

        document.querySelectorAll('.resize-handle').forEach(setupResizeHandle);
        loadSavedWidths();
      })();
    </script>
  </body>
