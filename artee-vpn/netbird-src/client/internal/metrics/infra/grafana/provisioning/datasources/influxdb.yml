apiVersion: 1

datasources:
  - name: InfluxDB
    uid: influxdb
    type: influxdb
    access: proxy
    url: http://influxdb:8086
    editable: true
    jsonData:
      version: Flux
      organization: Artee VPN
      defaultBucket: metrics
    secureJsonData:
      token: ${INFLUXDB_ADMIN_TOKEN}
