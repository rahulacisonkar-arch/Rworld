brews:
  - ids:
      - default
    skip_upload: "{{ .Env.SKIP_PUBLISH }}"
    repository:
      owner: Artee VPNio
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    commit_author:
      name: Artee VPN
      email: dev@Artee VPN.io
    description: Artee VPN project.
    download_strategy: CurlDownloadStrategy
    homepage: https://Artee VPN.io/
    license: "BSD3"
    test: |
      system "#{bin}/{{ .ProjectName	}} version"

uploads:
  - name: debian
    skip: "{{ .Env.SKIP_PUBLISH }}"
    ids:
      - Artee VPN_deb
    mode: archive
    target: https://pkgs.wiretrustee.com/debian/pool/{{ .ArtifactName }};deb.distribution=stable;deb.component=main;deb.architecture={{ if .Arm }}armhf{{ else }}{{ .Arch }}{{ end }};deb.package=
    username: dev@wiretrustee.com
    method: PUT

  - name: yum
    skip: "{{ .Env.SKIP_PUBLISH }}"
    ids:
      - Artee VPN_rpm
    mode: archive
    target: https://pkgs.wiretrustee.com/yum/{{ .Arch }}{{ if .Arm }}{{ .Arm }}{{ end }}
    username: dev@wiretrustee.com
    method: PUT

checksum:
  extra_files:
    - glob: ./infrastructure_files/getting-started-with-zitadel.sh
    - glob: ./release_files/install.sh
    - glob: ./infrastructure_files/getting-started.sh
    - glob: ./infrastructure_files/getting-started-enterprise.sh
    - glob: ./infrastructure_files/migrate-to-enterprise.sh

release:
  extra_files:
    - glob: ./infrastructure_files/getting-started-with-zitadel.sh
    - glob: ./release_files/install.sh
    - glob: ./infrastructure_files/getting-started.sh
    - glob: ./infrastructure_files/getting-started-enterprise.sh
    - glob: ./infrastructure_files/migrate-to-enterprise.sh

