version: 2
env:
  - SKIP_PUBLISH={{ if index .Env "SKIP_PUBLISH" }}{{ .Env.SKIP_PUBLISH }}{{ else }}true{{ end }}
  - SKIP_DOCKER_PUSH={{ if index .Env "SKIP_DOCKER_PUSH" }}{{ .Env.SKIP_DOCKER_PUSH }}{{ else }}false{{ end }}
project_name: Artee VPN
builds:
  - id: Artee VPN-wasm
    dir: client/wasm/cmd
    binary: Artee VPN
    env: [GOOS=js, GOARCH=wasm, CGO_ENABLED=0]
    goos:
      - js
    goarch:
      - wasm
    ldflags:
      - -s -w -X github.com/Artee VPNio/Artee VPN/version.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.CommitDate}} -X main.builtBy=goreleaser
    mod_timestamp: "{{ .CommitTimestamp }}"

  - id: Artee VPN
    dir: client
    binary: Artee VPN
    env: [CGO_ENABLED=0]
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - arm
      - amd64
      - arm64
      - 386
    ignore:
      - goos: windows
        goarch: arm
      - goos: windows
        goarch: 386
    ldflags:
      - -s -w -X github.com/Artee VPNio/Artee VPN/version.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.CommitDate}} -X main.builtBy=goreleaser
    mod_timestamp: "{{ .CommitTimestamp }}"
    tags:
      - load_wgnt_from_rsrc

  - id: Artee VPN-static
    dir: client
    binary: Artee VPN
    env: [CGO_ENABLED=0]
    goos:
      - linux
    goarch:
      - mips
      - mipsle
      - mips64
      - mips64le
    gomips:
      - hardfloat
      - softfloat
    ldflags:
      - -s -w -X github.com/Artee VPNio/Artee VPN/version.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.CommitDate}} -X main.builtBy=goreleaser
    mod_timestamp: "{{ .CommitTimestamp }}"
    tags:
      - load_wgnt_from_rsrc

  - id: Artee VPN-mgmt
    dir: management
    env:
      - CGO_ENABLED=1
      - >-
        {{- if eq .Runtime.Goos "linux" }}
          {{- if eq .Arch "arm64"}}CC=aarch64-linux-gnu-gcc{{- end }}
          {{- if eq .Arch "arm"}}CC=arm-linux-gnueabihf-gcc{{- end }}
        {{- end }}
    binary: Artee VPN-mgmt
    goos:
      - linux
    goarch:
      - amd64
      - arm64
      - arm
    goarm:
      - 7
    ldflags:
      - -s -w -X github.com/Artee VPNio/Artee VPN/version.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.CommitDate}} -X main.builtBy=goreleaser
    mod_timestamp: "{{ .CommitTimestamp }}"

  - id: Artee VPN-signal
    dir: signal
    env: [CGO_ENABLED=0]
    binary: Artee VPN-signal
    goos:
      - linux
    goarch:
      - amd64
      - arm64
      - arm
    goarm:
      - 7
    ldflags:
      - -s -w -X github.com/Artee VPNio/Artee VPN/version.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.CommitDate}} -X main.builtBy=goreleaser
    mod_timestamp: "{{ .CommitTimestamp }}"

  - id: Artee VPN-relay
    dir: relay
    env: [CGO_ENABLED=0]
    binary: Artee VPN-relay
    goos:
      - linux
    goarch:
      - amd64
      - arm64
      - arm
    goarm:
      - 7
    ldflags:
      - -s -w -X github.com/Artee VPNio/Artee VPN/version.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.CommitDate}} -X main.builtBy=goreleaser
    mod_timestamp: "{{ .CommitTimestamp }}"

  - id: Artee VPN-server
    dir: combined
    env:
      - CGO_ENABLED=1
      - >-
        {{- if eq .Runtime.Goos "linux" }}
          {{- if eq .Arch "arm64"}}CC=aarch64-linux-gnu-gcc{{- end }}
          {{- if eq .Arch "arm"}}CC=arm-linux-gnueabihf-gcc{{- end }}
        {{- end }}
    binary: Artee VPN-server
    goos:
      - linux
    goarch:
      - amd64
      - arm64
      - arm
    goarm:
      - 7
    ldflags:
      - -s -w -X github.com/Artee VPNio/Artee VPN/version.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.CommitDate}} -X main.builtBy=goreleaser
    mod_timestamp: "{{ .CommitTimestamp }}"

  - id: Artee VPN-upload
    dir: upload-server
    env: [CGO_ENABLED=0]
    binary: Artee VPN-upload
    goos:
      - linux
    goarch:
      - amd64
      - arm64
      - arm
    goarm:
      - 7
    ldflags:
      - -s -w -X github.com/Artee VPNio/Artee VPN/version.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.CommitDate}} -X main.builtBy=goreleaser
    mod_timestamp: "{{ .CommitTimestamp }}"

  - id: Artee VPN-proxy
    dir: proxy/cmd/proxy
    env: [CGO_ENABLED=0]
    binary: Artee VPN-proxy
    goos:
      - linux
    goarch:
      - amd64
      - arm64
      - arm
    goarm:
      - 7
    ldflags:
      - -s -w -X main.Version={{.Version}} -X main.Commit={{.Commit}} -X main.BuildDate={{.CommitDate}}
    mod_timestamp: "{{ .CommitTimestamp }}"

  - id: Artee VPN-idp-migrate
    dir: tools/idp-migrate
    env:
      - CGO_ENABLED=1
      - >-
        {{- if eq .Runtime.Goos "linux" }}
          {{- if eq .Arch "arm64"}}CC=aarch64-linux-gnu-gcc{{- end }}
          {{- if eq .Arch "arm"}}CC=arm-linux-gnueabihf-gcc{{- end }}
        {{- end }}
    binary: Artee VPN-idp-migrate
    goos:
      - linux
    goarch:
      - amd64
      - arm64
      - arm
    goarm:
      - 7
    ldflags:
      - -s -w -X github.com/Artee VPNio/Artee VPN/version.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.CommitDate}} -X main.builtBy=goreleaser
    mod_timestamp: "{{ .CommitTimestamp }}"

universal_binaries:
  - id: Artee VPN

archives:
  - builds:
      - Artee VPN
      - Artee VPN-static
  - id: Artee VPN-wasm
    builds:
      - Artee VPN-wasm
    name_template: "{{ .ProjectName }}_{{ .Version }}"
    format: binary
  - id: Artee VPN-idp-migrate
    builds:
      - Artee VPN-idp-migrate
    name_template: "Artee VPN-idp-migrate_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

nfpms:
  - maintainer: Artee VPN <dev@Artee VPN.io>
    description: Artee VPN client.
    homepage: https://Artee VPN.io/
    license: BSD-3-Clause
    id: Artee VPN_deb
    bindir: /usr/bin
    builds:
      - Artee VPN
    formats:
      - deb
    scripts:
      postinstall: "release_files/post_install.sh"
      preremove: "release_files/pre_remove.sh"

  - maintainer: Artee VPN <dev@Artee VPN.io>
    description: Artee VPN client.
    homepage: https://Artee VPN.io/
    license: BSD-3-Clause
    id: Artee VPN_rpm
    bindir: /usr/bin
    builds:
      - Artee VPN
    formats:
      - rpm
    scripts:
      postinstall: "release_files/post_install.sh"
      preremove: "release_files/pre_remove.sh"
    rpm:
      signature:
        key_file: '{{ if index .Env "GPG_RPM_KEY_FILE" }}{{ .Env.GPG_RPM_KEY_FILE }}{{ end }}'
dockers_v2:
   - id: Artee VPN
     disable: "{{ .Env.SKIP_DOCKER_PUSH }}"
     ids:
       - Artee VPN
     images:
       - Artee VPNio/Artee VPN
       - ghcr.io/Artee VPNio/Artee VPN
     tags:
       - "{{ .Version }}"
       - "{{ if eq .Env.SKIP_PUBLISH \"false\" }}latest{{ end }}"
     dockerfile: client/Dockerfile
     extra_files:
       - client/Artee VPN-entrypoint.sh
     platforms:
       - linux/amd64
       - linux/arm64
       - linux/arm/6
     annotations:
       "org.opencontainers.image.created": "{{.Date}}"
       "org.opencontainers.image.title": "{{.ProjectName}}"
       "org.opencontainers.image.version": "{{.Version}}"
       "org.opencontainers.image.revision": "{{.FullCommit}}"
       "org.opencontainers.image.source": "{{.GitURL}}"
       "maintainer": "dev@Artee VPN.io"
   - id: Artee VPN-rootless
     disable: "{{ .Env.SKIP_DOCKER_PUSH }}"
     ids:
       - Artee VPN
     images:
       - Artee VPNio/Artee VPN
       - ghcr.io/Artee VPNio/Artee VPN
     tags:
