# ============================================================
#  ARTEE VPN — Coturn STUN/TURN Server Configuration
#  This handles NAT traversal relay when direct P2P fails
# ============================================================

# Listening port for STUN/TURN
listening-port=3478
tls-listening-port=5349

# Your server's public IP address — CHANGE THIS
external-ip=127.0.0.1

# Your domain — CHANGE THIS
realm=vpn.artee.com
server-name=arteevpn

# Authentication: Time-Limited Credentials (HMAC-SHA1)
use-auth-secret
static-auth-secret=change-this-to-a-strong-random-secret-in-production

# Relay ports (UDP range for media relay)
min-port=49152
max-port=65535

# Logging
log-file=/var/log/coturn/turnserver.log
verbose

# Security
no-multicast-peers
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
no-cli
