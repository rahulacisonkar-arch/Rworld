version: '3.8'

services:
  # 1. Spatial Database
  database:
    image: postgis/postgis:15-3.3
    container_name: roofiq-database
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: rootiq_secret_password
      POSTGRES_DB: roofiq_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d roofiq_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - roofiq-network

  # 2. Redis Queue (BullMQ)
  redis:
    image: redis:7-alpine
    container_name: roofiq-redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - roofiq-network

  # 3. Vector Database (Embeddings storage)
  qdrant:
    image: qdrant/qdrant:latest
    container_name: roofiq-qdrant
    restart: always
    ports:
      - "6333:6333"
    volumes:
      - qdrantdata:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:6333/readyz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - roofiq-network

  # 4. S3 Object Store
  minio:
    image: minio/minio:latest
    container_name: roofiq-minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: minio_secret_password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - roofiq-network

  # 5. Node.js Backend Core
  backend-core:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: roofiq-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://postgres:rootiq_secret_password@database:5432/roofiq_db?schema=public
      - REDIS_URL=redis://redis:6379
      - MINIO_ENDPOINT=minio
      - MINIO_ACCESS_KEY=admin
      - MINIO_SECRET_KEY=minio_secret_password
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - roofiq-network

  # 6. FastAPI Python AI Microservice
  ai-service:
    build:
      context: .
      dockerfile: docker/Dockerfile.ai
    container_name: roofiq-ai-service
    restart: always
    ports:
      - "5001:5001"
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - MINIO_ENDPOINT=minio
    depends_on:
      qdrant:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - roofiq-network

  # 7. Next.js Frontend
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: roofiq-frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000
    depends_on:
      - backend-core
    networks:
      - roofiq-network

volumes:
  pgdata:
  qdrantdata:
  miniodata:

networks:
  roofiq-network:
    driver: bridge
