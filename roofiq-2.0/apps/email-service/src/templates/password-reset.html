<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: Arial, sans-serif; line-height: 1.6; color: #333333; }
    .container { padding: 20px; border: 1px solid #eeeeee; max-width: 600px; margin: 0 auto; }
    .header { font-size: 20px; font-weight: bold; margin-bottom: 20px; color: #dc2626; }
    .btn { display: inline-block; padding: 10px 20px; background-color: #dc2626; color: #ffffff; text-decoration: none; border-radius: 5px; margin-top: 15px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">Reset Your RoofIQ AI Password</div>
    <p>Hello,</p>
    <p>We received a request to reset your password. Click the button below to configure a new one:</p>
    <a href="{{resetUrl}}" class="btn">Reset Password</a>
    <p>This password reset link will expire in 60 minutes.</p>
  </div>
</body>
</html>
