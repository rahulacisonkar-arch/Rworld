<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: Arial, sans-serif; line-height: 1.6; color: #333333; }
    .container { padding: 20px; border: 1px solid #eeeeee; max-width: 600px; margin: 0 auto; }
    .header { font-size: 20px; font-weight: bold; margin-bottom: 20px; color: #1e3a8a; }
    .btn { display: inline-block; padding: 10px 20px; background-color: #3b82f6; color: #ffffff; text-decoration: none; border-radius: 5px; margin-top: 15px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">Verify your RoofIQ AI Account</div>
    <p>Hello {{name}},</p>
    <p>Welcome to RoofIQ AI 2.0. Please verify your registration by clicking the link below:</p>
    <a href="{{verificationUrl}}" class="btn">Verify Account</a>
    <p>If you did not sign up for this account, you can safely ignore this email.</p>
  </div>
</body>
</html>
