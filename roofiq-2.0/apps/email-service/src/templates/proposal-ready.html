<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: Arial, sans-serif; line-height: 1.6; color: #333333; }
    .container { padding: 20px; border: 1px solid #eeeeee; max-width: 600px; margin: 0 auto; }
    .header { font-size: 20px; font-weight: bold; margin-bottom: 20px; color: #2563eb; }
    .btn { display: inline-block; padding: 10px 20px; background-color: #2563eb; color: #ffffff; text-decoration: none; border-radius: 5px; margin-top: 15px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">Sales Proposal Ready</div>
    <p>Hello,</p>
    <p>A new roofing proposal has been generated for property: <strong>{{address}}</strong>.</p>
    <p>Total Estimated Shingles Material Cost: <strong>${{estimatedCost}}</strong></p>
    <a href="{{proposalUrl}}" class="btn">View Sales Proposal</a>
  </div>
</body>
</html>
